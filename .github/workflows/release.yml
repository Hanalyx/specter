name: Release

on:
  workflow_run:
    workflows: ["Pre-Release Test Suite"]
    types: [completed]
    branches: [main]

# `contents: write` lets goreleaser create the GitHub Release.
# `id-token: write` lets cosign fetch a sigstore OIDC token for keyless
# signing of checksums.txt.
permissions:
  contents: write
  id-token: write

defaults:
  run:
    working-directory: specter

# Concurrency guard: two near-simultaneous tag pushes would otherwise race
# goreleaser. cancel-in-progress: false because release artifacts are
# expensive to rebuild and we'd rather queue than abort midway.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # Only run when the upstream Pre-Release Test Suite (Tier 1+2+3) was
    # triggered by a tag push AND finished successfully. Otherwise a Tier 3
    # regression-matrix failure could publish artifacts before validation
    # completes.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: specter/go.mod
          cache-dependency-path: specter/go.sum

      # cosign for keyless signing of checksums.txt (configured in
      # specter/.goreleaser.yml signs: block).
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      # syft for CycloneDX SBOM emission per archive (configured in
      # specter/.goreleaser.yml sboms: block).
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: specter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
