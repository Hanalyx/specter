name: CI

on:
  push:
    branches: [main]
    paths: ['specter/**', '.github/**']
  pull_request:
    branches: [main]
    paths: ['specter/**', '.github/**']
  workflow_dispatch:

defaults:
  run:
    working-directory: specter

jobs:
  check:
    name: Vet, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: specter/go.mod
          cache-dependency-path: specter/go.sum

      - name: Format check
        run: |
          unformatted=$(gofmt -l $(find . -name "*.go" | grep -v vendor))
          if [ -n "$unformatted" ]; then
            echo "Files need gofmt: $unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.6.2
          working-directory: specter

      - name: Test
        run: go test ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Build
        run: go build -o bin/specter ./cmd/specter/

      - name: Dogfood
        run: |
          bin/specter parse specs/*.spec.yaml
          bin/specter resolve
          bin/specter check
          bin/specter coverage
          bin/specter sync

      - name: Validate PR title (Conventional Commits)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          TYPES="feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
          PATTERN="^($TYPES)(\([^)]+\))?(!)?: .+"
          if ! echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "::error::PR title does not follow Conventional Commits 1.0.0"
            echo "  Got:    $PR_TITLE"
            echo "  Format: <type>[(<scope>)][!]: <description>"
            echo "  Types:  feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "  See:    https://www.conventionalcommits.org/en/v1.0.0/"
            exit 1
          fi
          echo "PR title OK: $PR_TITLE"
