spec:
  id: spec-sync
  version: "1.0.0"
  status: approved
  tier: 2

  context:
    system: Specter toolchain
    feature: CI enforcer
    description: >
      Orchestrates all Specter tools in a single pass for CI integration.
      Runs parse, resolve, check, and coverage in sequence, reporting a
      unified pass/fail result with tier-based enforcement.
    related_specs:
      - "spec-parse.spec.yaml"
      - "spec-resolve.spec.yaml"
      - "spec-check.spec.yaml"
      - "spec-coverage.spec.yaml"

  objective:
    summary: >
      Run the full Specter validation pipeline (parse, resolve, check, coverage)
      and produce a unified pass/fail result suitable for CI gating.
    scope:
      includes:
        - "Run spec-parse on all discovered specs"
        - "Run spec-resolve on parsed specs"
        - "Run spec-check on resolved graph"
        - "Run spec-coverage on specs + test files"
        - "Unified exit code (0 = pass, 1 = fail)"
        - "Summary report of all phases"
      excludes:
        - "Git diff analysis (future: only check changed specs)"
        - "PR comment generation"
        - "Auto-fixing"

  constraints:
    - id: C-01
      description: "MUST run all four phases in order: parse, resolve, check, coverage"
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST stop at the first phase that has errors (no point checking if parse fails)"
      type: technical
      enforcement: error

    - id: C-03
      description: "MUST exit with code 0 only if all phases pass"
      type: technical
      enforcement: error

    - id: C-04
      description: "MUST report results from all completed phases"
      type: technical
      enforcement: error

  depends_on:
    - spec_id: spec-parse
      version_range: "^1.0.0"
      relationship: requires
    - spec_id: spec-resolve
      version_range: "^1.0.0"
      relationship: requires
    - spec_id: spec-check
      version_range: "^1.0.0"
      relationship: requires
    - spec_id: spec-coverage
      version_range: "^1.0.0"
      relationship: requires

  acceptance_criteria:
    - id: AC-01
      description: "Valid specs with full coverage produce exit code 0"
      references_constraints: ["C-01", "C-03"]
      priority: critical

    - id: AC-02
      description: "Parse errors stop the pipeline and produce exit code 1"
      references_constraints: ["C-02", "C-03"]
      priority: critical

    - id: AC-03
      description: "Dependency errors stop the pipeline after resolve phase"
      references_constraints: ["C-02", "C-03"]
      priority: high

    - id: AC-04
      description: "Check diagnostics (errors) produce exit code 1"
      references_constraints: ["C-03"]
      priority: high

    - id: AC-05
      description: "Coverage below tier threshold produces exit code 1"
      references_constraints: ["C-03", "C-04"]
      priority: high

  changelog:
    - version: "1.0.0"
      date: "2026-03-28"
      author: "specter-team"
      type: initial
      description: "Initial spec for the Specter CI enforcer"
