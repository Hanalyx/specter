spec:
  id: spec-explain
  version: "1.2.0"
  status: draft
  tier: 2

  context:
    system: Specter toolchain
    feature: AC coverage explainer + on-demand reference
    description: >
      A read-only diagnostic verb with four surfaces: coverage-aware spec/AC explanation
      (original 1.0.0 behavior), test-annotation reference (annotation), schema field
      reference (schema), and a human-readable spec card (AC-less spec-id). All surfaces
      write to stdout only; file-writing for AI tooling lives on `init --ai <tool>`.
      Part of the authoring loop: draft → check → explain → annotate → recheck.
    related_specs:
      - "spec-coverage"
      - "spec-parse"
      - "spec-manifest"

  objective:
    summary: >
      Given a spec ID, AC ID, or a reference keyword (annotation | schema), print the
      matching diagnostic or reference content to stdout so a developer or AI assistant
      can cover an uncovered AC or look up schema / annotation syntax in one step.
    scope:
      includes:
        - "Look up a spec by ID from parsed specs"
        - "Show all ACs with COVERED/UNCOVERED status when no AC ID given"
        - "Show annotation examples in language(s) detected from test files"
        - "Show which test files cover a specific AC"
        - "Show which test files were scanned"
        - "Exit 1 if spec ID not found"
        - "Print the test-annotation reference on `explain annotation`"
        - "Print the schema field reference on `explain schema` (full) or `explain schema <field-path>` (single field)"
        - "Print a human-readable spec card on `explain <spec-id>` with tier, coverage %, and per-AC test-file list"
      excludes:
        - "Writing or modifying any files"
        - "Running the full sync pipeline"
        - "Interactive prompts"

  constraints:
    - id: C-01
      description: "MUST accept argument in form <spec-id>:<ac-id> to show details for one AC"
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST accept <spec-id> alone and list all ACs with COVERED/UNCOVERED status"
      type: technical
      enforcement: error

    - id: C-03
      description: "MUST show ready-to-paste annotation examples for uncovered ACs in language(s) detected from test file extensions"
      type: technical
      enforcement: error

    - id: C-04
      description: "MUST show the count and list of test files scanned when producing explain output"
      type: technical
      enforcement: error

    - id: C-05
      description: "MUST show which file(s) cover an AC when the AC is already covered"
      type: technical
      enforcement: error

    - id: C-06
      description: "MUST NOT write or modify any files — read-only diagnostic"
      type: technical
      enforcement: error

    - id: C-07
      description: "MUST exit 1 with a clear error if the given spec ID is not found"
      type: technical
      enforcement: error

    - id: C-08
      description: "MUST detect annotation language from test file extensions: .go → Go comment, .py → Python comment, .ts/.tsx/.js/.jsx → JS comment; default to Go/generic if no test files found"
      type: technical
      enforcement: error

    - id: C-09
      description: "MUST print the test-annotation reference to stdout when invoked as `specter explain annotation`; content covers Convention A (runner-visible spec-id/AC-NN in the test title), Convention B (runner-visible spec-id/AC-NN via runtime log output), and the source-comment annotations (`// @spec`, `// @ac`) that pair with either convention"
      type: technical
      enforcement: error

    - id: C-10
      description: "MUST print the full schema field reference to stdout when invoked as `specter explain schema`, enumerating every field declared in the embedded JSON schema with type, default, and description"
      type: technical
      enforcement: error

    - id: C-11
      description: "MUST print single-field detail to stdout when invoked as `specter explain schema <field-path>` (e.g., `spec.acceptance_criteria.items.approval_gate`); exit non-zero on unknown path with a 'did you mean?' suggestion when similarity is within Levenshtein distance 3"
      type: technical
      enforcement: error

    - id: C-12
      description: "MUST print a human-readable spec card to stdout when invoked as `specter explain <spec-id>` with no AC suffix; card contains tier, current coverage percentage, and per-AC test-file list"
      type: technical
      enforcement: error

    - id: C-13
      description: "When `explain` shows the annotation example for an uncovered AC and the detected language is Python, the example MUST teach the dual-channel pattern: the source-comment annotation (`# @spec`/`# @ac`), the test function with a `@pytest.mark.spec(...)` decorator, the conftest.py autouse fixture that emits Convention B annotations into JUnit `<system-out>`, and the required `pytest.ini` settings (`junit_logging = system-out` plus the `spec` marker registration). Source comments alone don't satisfy `coverage --strict` — pytest's JUnit XML output does not include source-file scans, so without the runtime emission `specter ingest` sees no (spec_id, ac_id) pair for the test."
      type: business
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: "`specter explain my-spec` lists all ACs with COVERED or UNCOVERED label"
      inputs:
        spec_id: "my-spec"
        ac_ids: ["AC-01", "AC-02"]
        covered: ["AC-01"]
      expected_output:
        ac_01_label: "COVERED"
        ac_02_label: "UNCOVERED"
      references_constraints: ["C-02", "C-06"]
      priority: critical

    - id: AC-02
      description: "`specter explain my-spec:AC-02` shows annotation example for uncovered AC"
      inputs:
        spec_id: "my-spec"
        ac_id: "AC-02"
        covered: false
      expected_output:
        contains_annotation_example: true
        contains_spec_annotation: "// @spec my-spec"
        contains_ac_annotation: "// @ac AC-02"
      references_constraints: ["C-01", "C-03"]
      priority: critical

    - id: AC-03
      description: "When test files include .py files, Python-style annotation example is shown"
      inputs:
        test_files: ["test_user.py"]
        ac_id: "AC-01"
      expected_output:
        contains_python_syntax: "# @spec"
      references_constraints: ["C-08"]
      priority: high

    - id: AC-04
      description: "Covered AC shows which file(s) cover it, not an annotation example"
      inputs:
        ac_id: "AC-01"
        covered_in: "user_test.go"
      expected_output:
        shows_covered_file: true
        does_not_show_annotation_example: true
      references_constraints: ["C-05"]
      priority: high

    - id: AC-05
      description: "Unknown spec ID exits 1 with 'spec not found' message"
      inputs:
        spec_id: "does-not-exist"
      expected_output:
        exit_code: 1
        error_contains: "not found"
      references_constraints: ["C-07"]
      priority: critical

    - id: AC-06
      description: "Output includes count of test files scanned"
      references_constraints: ["C-04"]
      priority: high

    - id: AC-07
      description: "`specter explain annotation` output contains both a 'Convention A' section (with runner-visible `t.Run(\"spec-id/AC-NN ...\", ...)` example) and a 'Convention B' section (with source comments `// @spec` and `// @ac`)"
      inputs:
        invocation: "specter explain annotation"
      expected_output:
        contains_convention_a: true
        contains_convention_b: true
        exit_code: 0
      references_constraints: ["C-09"]
      priority: high

    - id: AC-08
      description: "`specter explain schema` output enumerates every top-level field declared in the embedded JSON schema at `internal/parser/spec-schema.json`"
      inputs:
        invocation: "specter explain schema"
      expected_output:
        enumerates_all_schema_fields: true
        exit_code: 0
      references_constraints: ["C-10"]
      priority: high

    - id: AC-09
      description: "`specter explain schema <invalid-path>` exits non-zero with 'unknown field path'; when similarity is within Levenshtein 3, output contains a 'did you mean?' suggestion"
      inputs:
        invocation: "specter explain schema spec.accptance_criteria"
      expected_output:
        exit_code_nonzero: true
        error_contains: "unknown field path"
        contains_did_you_mean: true
      references_constraints: ["C-11"]
      priority: high

    - id: AC-10
      description: "`specter explain <spec-id>` (no AC suffix) renders a spec card containing tier, current coverage percentage, and per-AC test-file list"
      inputs:
        invocation: "specter explain my-spec"
      expected_output:
        contains_tier: true
        contains_coverage_percent: true
        contains_per_ac_files: true
        exit_code: 0
      references_constraints: ["C-12"]
      priority: high

    - id: AC-11
      description: "`specter explain <spec-id>:AC-NN` for an uncovered AC, in a project where `discoverTestFiles` returns at least one `.py` file, prints the dual-channel pattern: a test function carrying both `# @spec`/`# @ac` source comments AND a `@pytest.mark.spec(...)` decorator, the conftest.py autouse fixture that emits Convention B annotations into JUnit `<system-out>`, and the `pytest.ini` block (marker registration + `junit_logging = system-out`). When ONLY `.py` files are detected, the Go `t.Run` example is NOT shown."
      inputs:
        test_files: ["tests/test_user.py"]
        ac_id: "AC-02"
        covered: false
      expected_output:
        contains_pytest_mark_spec: "@pytest.mark.spec"
        contains_conftest_autouse: "autouse=True"
        contains_pytest_ini: "junit_logging = system-out"
        contains_source_comment: "# @spec"
        does_not_contain_go_t_run: "// @spec"
      references_constraints: ["C-13", "C-08"]
      priority: critical

    - id: AC-12
      description: "Same uncovered-AC scenario when `discoverTestFiles` returns ONLY Go test files: the Convention A `t.Run` Go example is shown; the Python pytest-mark / conftest / pytest.ini pattern is NOT shown. Guards against the AC-11 fix accidentally showing Python boilerplate to Go-only projects."
      inputs:
        test_files: ["cmd/specter/foo_test.go"]
        ac_id: "AC-02"
        covered: false
      expected_output:
        contains_go_t_run: "t.Run"
        does_not_contain_pytest_mark_spec: "@pytest.mark.spec"
        does_not_contain_conftest: "autouse=True"
      references_constraints: ["C-13", "C-08"]
      priority: high

    - id: AC-13
      description: "When `discoverTestFiles` returns zero test files, the annotation example falls back to a generic Go example BUT also notes the dual-channel requirement (source comments alone don't satisfy `coverage --strict` — runtime visibility is required). Prevents the developer from being led down the source-only path on greenfield projects."
      inputs:
        test_files: []
        ac_id: "AC-02"
        covered: false
      expected_output:
        contains_generic_example: true
        contains_dual_channel_note: "coverage --strict"
      references_constraints: ["C-13"]
      priority: medium

  depends_on:
    - spec_id: spec-coverage
      version_range: "^1.0.0"
      relationship: requires
    - spec_id: spec-parse
      version_range: "^1.0.0"
      relationship: requires

  changelog:
    - version: "1.2.0"
      date: "2026-04-27"
      author: "specter-team"
      type: minor
      description: "v0.12 GH #77 — language-aware explain. When the detected test language is Python, the uncovered-AC annotation example now teaches the dual-channel pattern (source comments + pytest.mark.spec decorator + conftest autouse fixture + pytest.ini settings) instead of the source-only pattern, which silently fails under `coverage --strict`. Adds C-13 and AC-11/AC-12/AC-13."
    - version: "1.1.0"
      date: "2026-04-25"
      author: "specter-team"
      type: minor
      description: "v0.11 explain bundle — three new read-only surfaces (annotation, schema, AC-less spec card). Terminal output only; file-writing for AI tooling lives on init --ai <tool>. Adds C-09..C-12 and AC-07..AC-10."
    - version: "1.0.0"
      date: "2026-04-14"
      author: "specter-team"
      type: initial
      description: "Initial spec for the specter explain AC coverage explainer"
