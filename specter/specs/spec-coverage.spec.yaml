spec:
  id: spec-coverage
  version: "1.9.0"
  status: approved
  tier: 2

  context:
    system: Specter toolchain
    feature: Spec-to-test traceability matrix
    description: >
      Measures how thoroughly specs are covered by tests. Scans test files for
      @spec and @ac annotations and produces a coverage matrix showing which
      ACs have tests and which are uncovered.
    dependencies:
      - "fast-glob (3.x)"
    related_specs:
      - "spec-parse.spec.yaml"
    assumptions:
      - "Test files use @spec and @ac annotations in comments or decorators"
      - "Annotation format: // @spec <spec-id> and // @ac <AC-id>"

  objective:
    summary: >
      Produce a traceability matrix mapping spec IDs to their acceptance criteria
      to test files. Report coverage percentage per spec and identify uncovered ACs.
    scope:
      includes:
        - "Scan test files for @spec and @ac annotations"
        - "Map annotations to specs parsed by spec-parse"
        - "Calculate coverage percentage per spec"
        - "Identify uncovered ACs (in spec but no test references them)"
        - "Identify specs with zero test coverage"
        - "Tier-aware coverage thresholds (Tier 1: 100%, Tier 2: 80%, Tier 3: 50%)"
      excludes:
        - "Code file mapping (spec to source files)"
        - "Automatic detection without explicit annotations"
        - "Test execution or validation of test correctness"
        - "Code coverage integration (Istanbul, coverage.py)"

  constraints:
    - id: C-01
      description: "MUST recognize @spec annotations in single-line comments (// @spec <id> and # @spec <id>)"
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST recognize @ac annotations in single-line comments (// @ac <AC-id> and # @ac <AC-id>)"
      type: technical
      enforcement: error

    - id: C-03
      description: "MUST report coverage as a percentage: (covered ACs / total ACs) * 100"
      type: technical
      enforcement: error

    - id: C-04
      description: "MUST flag specs below their tier threshold as failing"
      type: business
      enforcement: error

    - id: C-05
      description: "MUST NOT depend on any CLI framework — pure function from SpecAST[] + file paths to CoverageReport"
      type: technical
      enforcement: error

    - id: C-06
      description: "MUST support per-spec coverage_threshold override: when a spec declares coverage_threshold: N (0–100), that value overrides the tier-based threshold for that spec only"
      type: technical
      enforcement: error

    - id: C-07
      description: "MUST support pass-rate-aware coverage for Tier 1: when .specter-results.json is present, a Tier 1 AC is only counted as covered if the annotation exists AND the result entry has passed: true"
      type: technical
      enforcement: error

    - id: C-08
      description: "MUST emit dependency_coverage warnings when spec A depends_on spec B and spec B has uncovered ACs that fall below spec B's effective coverage threshold"
      type: technical
      enforcement: error

    - id: C-09
      description: "MUST count every declared acceptance criterion in the denominator of the coverage percentage, including ACs marked gap: true. An AC marked gap: true with no matching @ac annotation counts as uncovered. Rationale: a spec whose ACs are all gaps has no captured intent and must fail coverage rather than silently pass."
      type: business
      enforcement: error

    - id: C-10
      description: "`specter coverage --json` MUST always emit a CoverageReport JSON document to stdout, including when one or more spec files fail to parse. The report's parse_errors array carries per-file failures; pass/fail is signalled by process exit code, not by the presence or absence of JSON output. Rationale: downstream consumers (VS Code extension, CI jobs) need a structured document in every state to distinguish 'no specs yet' from 'specs present but failed to parse'."
      type: technical
      enforcement: error

    - id: C-11
      description: "ExtractAnnotations MUST NOT treat comment-like lines appearing inside multi-line string literals as real annotations. Applies to backtick-delimited strings (TypeScript/JavaScript template literals, Go raw strings) and Python triple-quoted strings (''' and \"\"\"). Rationale: example fixtures and inline payloads frequently contain strings like \\`// @spec foo\\`; interpreting these as annotations produces phantom coverage entries."
      type: technical
      enforcement: error

    - id: C-12
      description: "`specter coverage --json` MUST emit spec_candidates_count (count of .spec.yaml files discovered on disk) so downstream consumers can distinguish `no specs exist` from `specs exist but failed to parse`. Rationale: without this field, a parse-failure workspace is indistinguishable from a greenfield one, so tools mistakenly suggest `specter init`."
      type: technical
      enforcement: error

    - id: C-13
      description: "`specter coverage --json` MUST emit parse_error_patterns — a list grouping parse_errors by (type, path) sorted by count descending. Enables downstream consumers to surface schema drift in one sentence (`20 specs: missing required field 'objective'`) instead of N individual messages."
      type: technical
      enforcement: error

    - id: C-14
      description: "Array-valued fields in the coverage JSON output MUST NOT be emitted as `null`. Fields without `omitempty` MUST emit `[]` when empty (the Go struct field is initialized as an empty slice, not left as nil). Fields with `omitempty` MUST be absent from the output when empty (Go's default behavior). Rationale: downstream TypeScript consumers declare these fields as `string[]` (non-nullable arrays); emitting `null` is a silent type contract violation that crashes any consumer iterating without a nullish-coalesce guard."
      type: technical
      enforcement: error

    - id: C-15
      description: "The default table output of `specter coverage` MUST sort entries worst-first — failing specs (below threshold AND not 100%) first, then partial coverage (below 100% but passing threshold), then 100%-covered. Within each bucket, sort by tier descending (T1 > T2 > T3) so higher-risk work surfaces first. Rationale: on a large workspace (100+ specs), the developer needs to see what requires attention at the top; hiding failures in a sea of PASS defeats the table's purpose."
      type: business
      enforcement: error

    - id: C-16
      description: "Every table output of `specter coverage` MUST include a summary header line above the table, formatted as `Spec Coverage Report — N specs · P% avg coverage` followed by per-tier breakdown lines (`  Tier K: X/Y passing (Z%)`) for each tier present in the report. The header MUST reflect the full report state, not a filtered view. Rationale: one-glance readability on workspaces where the table itself is long."
      type: business
      enforcement: error

    - id: C-17
      description: "`specter coverage --failing` MUST restrict the table to entries whose `passes_threshold == false` OR `coverage_pct < 100` (i.e. everything below 100% coverage, whether it's under threshold or just not complete). The summary header still reflects the full report, not the filtered view. When all entries are 100%, the filter produces an empty table with a single-line confirmation: `All N specs at 100% coverage.`"
      type: technical
      enforcement: error

    - id: C-18
      description: "In the default table output, spec IDs longer than 40 characters MUST be truncated in the `Spec ID` column with a trailing ellipsis (`…`) so subsequent columns remain aligned. The `--json` output is unaffected — it emits the full spec_id. Rationale: long path-derived IDs (e.g. `app-api-admin-appointments-id-service`) break the table in v0.9.0/v0.9.1; alignment is a legibility prerequisite for the sort + summary work to be useful."
      type: technical
      enforcement: error

    - id: C-19
      description: "`specter coverage --strict` MUST treat any annotated AC as uncovered unless a .specter-results.json entry for that (spec_id, ac_id) exists with status=passed. Applies to ALL tiers, not just Tier 1. A skipped, failed, or errored entry demotes the AC to uncovered regardless of annotation presence. Rationale: a green Specter gate must mean tests actually passed — eval phase enforcement for the SDD loop."
      type: business
      enforcement: error

    - id: C-20
      description: "Under `--strict`, a missing `.specter-results.json` file (or an empty results array) MUST produce a hard failure (non-zero exit, explanatory stderr message `--strict requires .specter-results.json — run 'specter ingest' first`). Rationale: --strict is a contract that test results were verified; no results means the contract can't be satisfied, and silently falling back to annotation-only would defeat the purpose."
      type: business
      enforcement: error

    - id: C-21
      description: "The .specter-results.json schema MUST accept entries with an explicit `status` field whose value is one of {passed, failed, skipped, errored}. For back-compat, entries without `status` but with `passed: true` are treated as status=passed; entries with `passed: false` and no status are treated as status=failed. The coverage package's result-lookup function uses status when present, falls back to passed otherwise."
      type: technical
      enforcement: error

  depends_on:
    - spec_id: spec-parse
      version_range: "^1.0.0"
      relationship: requires

  acceptance_criteria:
    - id: AC-01
      description: "Test file with @spec user-auth and @ac AC-01, AC-02 maps correctly"
      inputs:
        test_file: "user-auth.test.ts with // @spec user-auth and // @ac AC-01 and // @ac AC-02"
        spec: "user-auth with AC-01, AC-02, AC-03"
      expected_output:
        spec_id: "user-auth"
        covered_acs: ["AC-01", "AC-02"]
        uncovered_acs: ["AC-03"]
        coverage_pct: 66.7
      references_constraints: ["C-01", "C-02", "C-03"]
      priority: critical

    - id: AC-02
      description: "Spec with no matching test files reports 0% coverage"
      inputs:
        spec: "orphan-spec with AC-01, AC-02"
        test_files: "none match"
      expected_output:
        coverage_pct: 0
        status: "SPEC ONLY"
      references_constraints: ["C-03"]
      priority: high

    - id: AC-03
      description: "Tier 1 spec at 80% coverage is flagged as failing (threshold is 100%)"
      inputs:
        spec: "tier 1, 4 of 5 ACs covered"
      expected_output:
        coverage_pct: 80
        passes_threshold: false
        required_threshold: 100
      references_constraints: ["C-04"]
      priority: high

    - id: AC-04
      description: "Tier 3 spec at 60% coverage passes (threshold is 50%)"
      inputs:
        spec: "tier 3, 3 of 5 ACs covered"
      expected_output:
        coverage_pct: 60
        passes_threshold: true
        required_threshold: 50
      references_constraints: ["C-04"]
      priority: medium

    - id: AC-05
      description: "Python-style annotations (# @spec, # @ac) are recognized"
      inputs:
        test_file: "test_auth.py with # @spec user-auth and # @ac AC-01"
      expected_output:
        spec_id: "user-auth"
        covered_acs: ["AC-01"]
      references_constraints: ["C-01", "C-02", "C-05"]
      priority: medium

    - id: AC-06
      description: "Per-spec coverage_threshold: 75 overrides tier threshold — a Tier 1 spec with coverage_threshold: 75 passes at 80% (not the default 100%)"
      references_constraints: ["C-06"]
      priority: high

    - id: AC-07
      description: "Tier 1 spec with annotation but failed .specter-results.json entry is NOT counted as covered"
      references_constraints: ["C-07"]
      priority: high

    - id: AC-08
      description: "spec A depends_on spec B; spec B has uncovered ACs; CheckDependencyCoverage emits dependency_coverage warning for spec A"
      references_constraints: ["C-08"]
      priority: high

    - id: AC-09
      description: "A Tier 3 spec with 3 ACs all marked gap: true and no @ac annotations reports total_acs=3, covered=0, coverage_pct=0, passes_threshold=false. A 100%-gap spec fails regardless of tier."
      inputs:
        spec: "tier 3, 3 ACs, all gap: true, no annotations"
      expected_output:
        total_acs: 3
        covered_acs: []
        uncovered_acs: ["AC-01", "AC-02", "AC-03"]
        coverage_pct: 0
        passes_threshold: false
      references_constraints: ["C-09"]
      priority: critical

    - id: AC-10
      description: "`specter coverage --json` run in a workspace where every spec file has a schema violation emits valid JSON containing an empty entries array, a zeroed summary, and a parse_errors array with at least one entry (file + message populated). Process exits non-zero."
      inputs:
        workspace: "one .spec.yaml present, missing required field `objective`"
        command: "specter coverage --json"
      expected_output:
        stdout: "valid CoverageReport JSON"
        entries: []
        parse_errors_count: ">= 1"
        exit_code: "non-zero"
      references_constraints: ["C-10"]
      priority: critical

    - id: AC-11
      description: "A TypeScript test file that contains a template literal whose body includes the literal text `// @spec ghost-spec` produces zero annotations for `ghost-spec`. The same file's real `// @spec real-spec` on an actual comment line is still detected."
      inputs:
        file: |
          // @spec real-spec
          const payload = `
            // @spec ghost-spec
            // @ac AC-99
          `;
      expected_output:
        spec_ids_extracted: ["real-spec"]
        ghost_spec_present: false
      references_constraints: ["C-11"]
      priority: high

    - id: AC-12
      description: "`specter coverage --json` run in a workspace with 3 .spec.yaml files (all schema-invalid) emits spec_candidates_count: 3, entries: [], parse_errors populated. Run in an empty workspace emits spec_candidates_count: 0, entries: [], parse_errors absent or empty."
      references_constraints: ["C-12"]
      priority: high

    - id: AC-13
      description: "SummarizeParseErrors, given 20 ParseErrorEntry values all with Type=\"required\" and Path=\"spec.objective\", returns one ParseErrorPattern with Count=20, Type=\"required\", Path=\"spec.objective\", Files containing all 20 unique file paths. When mixed with one entry of Type=\"enum\", the \"required\"/\"spec.objective\" pattern sorts first by count."
      references_constraints: ["C-13"]
      priority: high

    - id: AC-14
      description: "`specter coverage --json` run on a workspace where every AC is covered emits `\"uncovered_acs\": []` for the covered entries (not `null`). Run on a workspace with no parse failures, the top-level `parse_errors` and `parse_error_patterns` fields are absent entirely (Go's `omitempty` behavior) rather than emitted as `null`. No field declared as `[]T` in a downstream TypeScript consumer ever receives `null` from the CLI."
      inputs:
        case_a: "spec with 100% coverage → uncovered_acs should be []"
        case_b: "run with no parse failures → parse_errors should be absent"
      expected_output:
        case_a_value: "[]"
        case_a_type: "array"
        case_b_present: false
      references_constraints: ["C-14"]
      priority: high

    - id: AC-15
      description: "Given a report with three entries — one failing below threshold (40%, tier 2), one partial passing (60% coverage on tier 3 with 50% threshold → passes), and one 100% covered (tier 1) — the default table output orders them: failing first, partial second, 100% third. A pure sort function SortCoverageEntriesForDisplay over []SpecCoverageEntry MUST produce this order deterministically."
      inputs:
        entries: "3 entries (40%/T2/FAIL, 60%/T3/PASS-partial, 100%/T1/PASS)"
      expected_output:
        order: ["failing-t2", "partial-t3", "complete-t1"]
      references_constraints: ["C-15"]
      priority: high

    - id: AC-16
      description: "Given a report with 14 specs across tiers (T1: 4, T2: 8, T3: 2), a pure function BuildSummaryHeader(report) returns a multi-line string starting with `Spec Coverage Report — 14 specs · {avg_pct}% avg coverage` and containing three `  Tier K: X/Y passing (Z%)` lines (one per tier present). Tiers with zero specs are omitted. Format is stable for regression pinning."
      inputs:
        report: "14 specs: 4xT1 (all passing), 8xT2 (6 passing), 2xT3 (1 passing)"
      expected_output:
        header_contains: "Spec Coverage Report — 14 specs"
        tier_lines:
          - "Tier 1: 4/4 passing"
          - "Tier 2: 6/8 passing"
          - "Tier 3: 1/2 passing"
      references_constraints: ["C-16"]
      priority: high

    - id: AC-17
      description: "`specter coverage --failing` on a 14-spec workspace where 2 specs are below 100% (1 failing, 1 partial) prints the summary header (reflecting all 14), then a table containing only those 2 entries. On a workspace where all 14 are 100%, the flag produces no table and a single line: `All 14 specs at 100% coverage.` Exit code respects threshold, not the filter."
      inputs:
        case_a: "14 specs, 2 below 100% (1 FAIL, 1 partial-PASS)"
        case_b: "14 specs, all 100% covered"
      expected_output:
        case_a_table_rows: 2
        case_b_table_empty: true
        case_b_footer_contains: "All 14 specs at 100% coverage"
      references_constraints: ["C-17"]
      priority: high

    - id: AC-18
      description: "A spec ID of 50 characters (e.g. `app-api-admin-appointments-id-service-override`) rendered in the default table is truncated to 40 characters followed by `…` (ellipsis), keeping the Tier column aligned. `specter coverage --json` emits the full ID unchanged. A function TruncateSpecID(id, maxLen) is the pure helper under this AC."
      inputs:
        id: "app-api-admin-appointments-id-service-override"
        max_len: 40
      expected_output:
        truncated: "app-api-admin-appointments-id-service-o…"
        truncated_length: 40
      references_constraints: ["C-18"]
      priority: medium

    - id: AC-19
      description: "Given a Tier 2 spec with annotation @ac AC-03 and a .specter-results.json entry {spec_id, AC-03, status: failed}, BuildCoverageReportWithResults under StrictMode=true returns CoverageReport where AC-03 is listed in UncoveredACs (not CoveredACs). Same input under StrictMode=false (non-strict) lists AC-03 as CoveredACs because tier-2 does not pass-rate-check without --strict."
      inputs:
        spec: "tier 2, AC-03 annotated, results file: {AC-03, failed}"
      expected_output:
        strict_true_uncovered: ["AC-03"]
        strict_false_covered: ["AC-03"]
      references_constraints: ["C-19"]
      priority: critical

    - id: AC-20
      description: "Under StrictMode=true with an empty or nil ResultsFile, the coverage command MUST return an error (surfaces as exit non-zero). The error message MUST contain the literal string `--strict requires .specter-results.json`. Rationale: silently falling back to annotation-only under --strict defeats the gate's purpose."
      references_constraints: ["C-20"]
      priority: critical

    - id: AC-21
      description: "ParseResultsFile accepts JSON {\"results\":[{\"spec_id\":\"s\",\"ac_id\":\"AC-01\",\"status\":\"failed\"}]} and returns a ResultsFile whose entry has Status=\"failed\" and Passed=false. Given back-compat input {\"results\":[{\"spec_id\":\"s\",\"ac_id\":\"AC-01\",\"passed\":true}]} (no status field), the entry has Status=\"passed\" (derived) and Passed=true. Status and Passed are kept internally consistent."
      references_constraints: ["C-21"]
      priority: high

    - id: AC-22
      description: "The result-lookup function ResultsFile.status(specID, acID) returns `passed` when an entry has status=passed, `failed`/`skipped`/`errored` for matching entries, and `unknown` when no entry exists. Under StrictMode=true, `unknown` and any non-passed status demote the AC to uncovered. Under StrictMode=false, behavior matches today's boolean passed() function."
      references_constraints: ["C-19", "C-21"]
      priority: high

  changelog:
    - version: "1.9.0"
      date: "2026-04-22"
      author: "specter-team"
      type: minor
      description: "Add C-19/AC-19 (--strict treats non-passed annotated ACs as uncovered across all tiers), C-20/AC-20 (missing results file under --strict is a hard fail), C-21/AC-21/AC-22 (extended .specter-results.json status enum with back-compat boolean). Closes the test-quality hole where annotated-but-failing or annotated-but-skipped tests silently counted as covered — eval phase enforcement for the SDD loop. Requires spec-ingest 1.0.0+ to produce results files."
    - version: "1.8.0"
      date: "2026-04-20"
      author: "specter-team"
      type: minor
      description: "Add C-15/AC-15 (table sort worst-first), C-16/AC-16 (summary header with per-tier breakdown), C-17/AC-17 (--failing filter), C-18/AC-18 (spec-ID truncation for column alignment). UX improvements driven by jwtms migration testing where 249 specs produced an unreadable wall of green."
    - version: "1.7.0"
      date: "2026-04-19"
      author: "specter-team"
      type: minor
      description: "Add C-14/AC-14: coverage --json emits `[]` (not `null`) for empty array fields without omitempty; fields with omitempty are absent rather than null. Eliminates a latent runtime-crash class on the TypeScript consumer side where types declare `string[]` but Go emits `null`."
    - version: "1.6.0"
      date: "2026-04-19"
      author: "specter-team"
      type: minor
      description: "Add C-12/AC-12 (spec_candidates_count field), C-13/AC-13 (parse_error_patterns summary). Together these let downstream consumers distinguish `no specs exist` from `schema drift`, and collapse N identical parse failures into one actionable diagnosis. Drives AC-29 sidebar messaging and specter doctor pattern analysis."
    - version: "1.5.0"
      date: "2026-04-18"
      author: "specter-team"
      type: minor
      description: "Add C-10/AC-10: `specter coverage --json` always emits a CoverageReport document, including on parse failure. Parse errors surface via a new `parse_errors` field. Unblocks the VS Code extension's three-state sidebar (no-specs / have-specs / parse-failed)."
    - version: "1.4.0"
      date: "2026-04-17"
      author: "specter-team"
      type: minor
      description: "BEHAVIOR CHANGE: gap: true ACs now count as uncovered (C-09/AC-09). Prior 1.3.x silently exempted 100%-gap specs from threshold enforcement, letting unreviewed reverse-compiled specs pass sync."
    - version: "1.3.0"
      date: "2026-04-14"
      author: "specter-team"
      type: minor
      description: "Add C-06/AC-06 per-spec coverage_threshold override, C-07/AC-07 pass-rate-aware coverage for Tier 1, C-08/AC-08 dependency_coverage warnings"
    - version: "1.0.0"
      date: "2026-03-28"
      author: "specter-team"
      type: initial
      description: "Initial spec for the Specter coverage tool"
