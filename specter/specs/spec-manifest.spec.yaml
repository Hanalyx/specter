spec:
  id: spec-manifest
  version: "1.8.0"
  status: draft
  tier: 2

  context:
    system: Specter toolchain
    feature: Project manifest, spec registry, and domain grouping
    description: >
      Adds a project-level manifest (specter.yaml) that defines the system,
      groups specs into domains with tier inheritance, maintains an auto-updated
      spec registry, and provides configurable coverage thresholds. This is the
      missing layer that connects individual specs into a coherent system —
      analogous to tsconfig.json for TypeScript or go.mod for Go.
    dependencies:
      - "gopkg.in/yaml.v3 (YAML parsing)"
    related_specs:
      - "spec-parse"
      - "spec-sync"
    assumptions:
      - "specter.yaml is discovered by walking up from CWD"
      - "All commands work without a specter.yaml (backward compatible)"
      - "The registry section is auto-maintained, not manually edited"
      - "Domain info lives in the manifest, not in individual spec files"

  objective:
    summary: >
      Parse and validate specter.yaml project manifests. Provide tier
      inheritance (spec -> domain -> system -> default), domain-level coverage
      aggregation, auto-maintained spec registry, and a scaffold command for
      first-run experience.
    scope:
      includes:
        - "Parse specter.yaml into typed Manifest structure"
        - "Validate manifest fields (system.name required, tiers 1-3, etc.)"
        - "Discover specter.yaml by walking up from CWD"
        - "Resolve spec tiers via cascade: spec -> domain -> system -> default(2)"
        - "Group specs by domain for coverage reporting"
        - "Auto-update registry from parsed specs on every sync run"
        - "Scaffold specter.yaml from existing specs via specter init"
        - "Configurable coverage thresholds per tier"
        - "Backward compatibility — all commands work without manifest"
      excludes:
        - "Changes to spec-schema.json"
        - "Interactive specter init (flags only)"
        - "Nested domains or domain hierarchies"
        - "Remote registry or spec publishing"
        - "Domain-level dependency rules"

  constraints:
    - id: C-01
      description: "MUST parse valid specter.yaml into a typed Manifest structure with system, domains, settings, and registry sections"
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST require system.name field — return validation error if missing"
      type: technical
      enforcement: error

    - id: C-03
      description: "MUST validate tier values as 1, 2, or 3 in system.tier and domain tiers"
      type: technical
      enforcement: error

    - id: C-04
      description: "MUST resolve spec tiers via cascade: explicit spec tier -> domain tier -> system tier -> default 2"
      type: business
      enforcement: error

    - id: C-05
      description: "MUST return sensible defaults when no specter.yaml exists (specs_dir=specs, coverage T1=100 T2=80 T3=50)"
      type: technical
      enforcement: error

    - id: C-06
      description: "MUST auto-update the registry section from the current set of parsed specs"
      type: business
      enforcement: error

    - id: C-07
      description: "MUST aggregate spec-level coverage into domain-level summaries"
      type: business
      enforcement: error

    - id: C-08
      description: "MUST generate a valid specter.yaml scaffold from existing spec IDs"
      type: technical
      enforcement: error

    - id: C-09
      description: "MUST NOT break existing commands when no specter.yaml is present"
      type: technical
      enforcement: error

    - id: C-10
      description: "MUST NOT depend on any CLI framework — pure functions from YAML string to typed structures"
      type: technical
      enforcement: error

    - id: C-11
      description: "MUST parse settings.strict (bool): when true, all warning-severity check diagnostics are treated as errors"
      type: technical
      enforcement: error

    - id: C-12
      description: "MUST parse settings.warn_on_draft (bool): when true, specter check emits a warning for every spec with status: draft"
      type: technical
      enforcement: error

    - id: C-13
      description: "MUST provide spec file templates (api-endpoint, service, auth, data-model) via specter init --template that produce valid draft .spec.yaml files passing ParseSpec()"
      type: technical
      enforcement: error

    - id: C-14
      description: "MUST parse settings.tier_overrides (map[spec-id]int) and emit a tier_conflict warning when a spec's declared tier disagrees with its override value"
      type: technical
      enforcement: error

    - id: C-15
      description: "ScaffoldManifest MUST emit a comment pointing at the canonical Specter GitHub repository. The URL MUST be https://github.com/Hanalyx/specter (not spec-dd, not another slug). The URL lives in the scaffold header and is the only external link shipped in fresh manifests — users clicking it must land on the right repo."
      type: business
      enforcement: error

    - id: C-16
      description: "ScaffoldManifest MUST always emit a `domains:` section. When the caller provides at least one spec ID, a default domain carries those IDs. When the caller provides zero spec IDs, the scaffolder MUST emit an empty default-domain placeholder with a description explaining the shape — either `Add spec IDs here` (greenfield) or `N spec files were discovered but could not be parsed` (drift). Rationale: a manifest with no `domains:` silently excludes every subsequent spec from sync, so the operator's first `specter sync` looks green while ignoring their work."
      type: business
      enforcement: error

    - id: C-17
      description: "`specter init --refresh` MUST update only `domains.default.specs` in an existing `specter.yaml`, leaving every other manifest field untouched: `system`, `settings`, `registry`, `settings.tier_overrides`, and any custom domains the operator declared (anything under `domains.*` that isn't `default`). Rationale: after adding new specs, the operator needs a deterministic, non-destructive way to refresh the manifest; `--force` rewrites everything, losing manual configuration."
      type: business
      enforcement: error

    - id: C-18
      description: "`specter init --refresh` MUST rescan `settings.specs_dir` (or the default `specs/`) for parseable spec files, collect their IDs, and replace `domains.default.specs` with the resulting set. Specs that previously appeared in `domains.default.specs` but no longer exist on disk (or fail to parse) MUST be removed from the list. The command MUST print a summary line of the form `updated specter.yaml: +A added, -B removed` where A and B are counts. Parse-failing specs are skipped with the v0.9.0 pattern-analysis warning."
      type: technical
      enforcement: error

    - id: C-19
      description: "`specter init --refresh` MUST NOT touch custom domains. If `domains.auth.specs` contains spec IDs, --refresh leaves the `auth` domain entirely alone. Specs that are discovered on disk but already claimed by a non-default domain MUST NOT be added to `domains.default.specs`. Rationale: a spec can only belong to one domain; refresh is about the 'catch-all' default domain, not about redistribution."
      type: business
      enforcement: error

    - id: C-20
      description: "`specter init --refresh --dry-run` MUST print the proposed diff (which specs would be added, which removed from `domains.default.specs`) to stdout and exit 0 WITHOUT writing any file changes to disk. The manifest on disk is unchanged after the command exits. Rationale: lets operators review before committing; matches `git add -p` / `terraform plan` discipline."
      type: business
      enforcement: error

    - id: C-21
      description: "`--refresh` and `--force` MUST be mutually exclusive. `specter init --refresh --force` MUST exit non-zero with a clear error message naming the conflict. Rationale: `--force` rewrites everything (operator accepts loss); `--refresh` preserves everything except `domains.default.specs` (operator wants a surgical update). Combining them is incoherent and almost always a mistake."
      type: technical
      enforcement: error

    - id: C-22
      description: "`specter init --install-hook` MUST write a `.git/hooks/pre-push` shell script (mode 0755) that blocks pushes whose diff changes implementation files but adds or updates no `@spec` / `@ac` annotations. The hook MUST exit 0 on changes that include either an annotation delta or only doc/spec/test files; MUST exit non-zero with a clear message otherwise; and MUST be bypassable via `git push --no-verify`. The hook script body is wrapped in shell-comment markers `# specter:begin v1` / `# specter:end` (HTML-comment markers would be invalid shell syntax — `<!--` parses as a redirection token), and re-runs replace only the fenced region. The installed hook MUST parse cleanly under `sh -n`."
      type: technical
      enforcement: error

    - id: C-23
      description: "`specter init --ai <tool>` MUST write a per-tool AI instruction file with a `<!-- specter:begin v1 --> ... <!-- specter:end -->` fenced region containing the v0.11 instruction template (preflight, Convention A, validation gate, on-demand explain references). The fenced region's tool-target path is: `claude` → `CLAUDE.md`, `codex` → `AGENTS.md`, `cursor` → `.cursor/rules/specter.md`, `copilot` → `.github/copilot-instructions.md` (body capped at 4KB), `gemini` → `GEMINI.md`. Re-runs MUST replace only the fenced region; out-of-fence content is preserved byte-for-byte. `--ai claude` checks for an existing `AGENTS.md` and writes `@AGENTS.md` import directive instead of inlining the body when one exists."
      type: technical
      enforcement: error

    - id: C-24
      description: "MUST parse `settings.strictness` (string enum: `annotation` | `threshold` | `zero-tolerance`) with default `threshold`. The level governs `coverage --strict` semantics in spec-coverage; spec-manifest's role is parse-only — accept the three values, default when unset, reject any other string with a clear error naming the valid options."
      type: technical
      enforcement: error

    - id: C-25
      description: "MUST parse `settings.tests_glob` as either a string (single glob) or a list of strings (multiple globs) into a normalized `[]string`. Used by `coverage` and `sync` as the default test-discovery pattern when `--tests` is unset. Closes the silent-0% UX hole where users running `coverage --strict` on a Python/Node project with no `--tests` flag see all ACs reported as uncovered because `filepath.Walk(\".\")` misses their `tests/**/*.py` layout."
      type: technical
      enforcement: error

    - id: C-26
      description: "ParseManifest MUST reject any unknown key under the `settings:` block (and at the top level of the manifest) with a clear error naming the offending key, the closest valid key by Levenshtein distance ≤ 3 (`did you mean: <key>?`), and the full list of valid keys at that level. Rationale: today `settings.tests_glob:` (a plausible-but-misspelled-or-not-yet-existing key) parses cleanly and is silently ignored, leading users to believe their manifest is configured when in fact the key did nothing. The same silent-acceptance footgun threatens any new settings key (e.g., the v0.11 `strictness` field) — making the rejection a parse-level invariant closes the class."
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: "Valid specter.yaml with all sections parses into Manifest struct"
      inputs:
        yaml: "system.name + domains + settings + registry"
      expected_output:
        manifest: "fully populated Manifest struct"
      references_constraints: ["C-01"]
      priority: critical

    - id: AC-02
      description: "Missing system.name returns validation error"
      inputs:
        yaml: "specter.yaml without system.name"
      expected_output:
        error: "system.name is required"
      references_constraints: ["C-02"]
      priority: critical

    - id: AC-03
      description: "Invalid tier (0, 4, -1) returns validation error"
      inputs:
        yaml: "system.tier: 4"
      expected_output:
        error: "tier must be 1, 2, or 3"
      references_constraints: ["C-03"]
      priority: high

    - id: AC-04
      description: "Spec with explicit tier ignores domain and system tier"
      inputs:
        spec_tier: 3
        domain_tier: 1
        system_tier: 2
      expected_output:
        resolved_tier: 3
      references_constraints: ["C-04"]
      priority: critical

    - id: AC-05
      description: "Spec without tier inherits domain tier"
      inputs:
        spec_tier: 0
        domain_tier: 1
      expected_output:
        resolved_tier: 1
      references_constraints: ["C-04"]
      priority: critical

    - id: AC-06
      description: "Spec without tier or domain inherits system tier"
      inputs:
        spec_tier: 0
        domain_tier: 0
        system_tier: 2
      expected_output:
        resolved_tier: 2
      references_constraints: ["C-04"]
      priority: high

    - id: AC-07
      description: "Spec without any tier info defaults to 2"
      inputs:
        spec_tier: 0
        domain_tier: 0
        system_tier: 0
      expected_output:
        resolved_tier: 2
      references_constraints: ["C-04"]
      priority: high

    - id: AC-08
      description: "Defaults() returns sensible manifest when no specter.yaml exists"
      expected_output:
        specs_dir: "specs"
        coverage_t1: 100
        coverage_t2: 80
        coverage_t3: 50
      references_constraints: ["C-05"]
      priority: high

    - id: AC-09
      description: "BuildRegistryFromSpecs produces entries for all parsed specs"
      inputs:
        specs: "3 specs with IDs checkout, login, blog"
      expected_output:
        registry_count: 3
      references_constraints: ["C-06"]
      priority: critical

    - id: AC-10
      description: "Specs in domains get correct domain field in registry"
      inputs:
        spec_id: "checkout"
        domain: "payments"
      expected_output:
        registry_domain: "payments"
      references_constraints: ["C-06"]
      priority: high

    - id: AC-11
      description: "DomainCoverage aggregates per-spec coverage into per-domain summary"
      inputs:
        domain: "payments"
        specs_in_domain: 3
        coverage_pcts: [100, 90, 80]
      expected_output:
        avg_coverage: 90
        passing: 3
      references_constraints: ["C-07"]
      priority: high

    - id: AC-12
      description: "ScaffoldManifest produces valid YAML that round-trips through ParseManifest"
      inputs:
        name: "my-app"
        spec_ids: ["auth", "payments"]
      expected_output:
        parse_ok: true
      references_constraints: ["C-08"]
      priority: high

    - id: AC-13
      description: "All existing commands produce identical output without specter.yaml"
      references_constraints: ["C-09"]
      priority: critical

    - id: AC-14
      description: "Manifest package has zero CLI or I/O dependencies"
      references_constraints: ["C-10"]
      priority: high

    - id: AC-15
      description: "Manifest with settings.strict: true parses with Strict=true in Settings struct"
      inputs:
        yaml: "settings:\n  strict: true"
      expected_output:
        settings_strict: true
      references_constraints: ["C-11"]
      priority: high

    - id: AC-16
      description: "Manifest with settings.warn_on_draft: true parses with WarnOnDraft=true in Settings struct"
      inputs:
        yaml: "settings:\n  warn_on_draft: true"
      expected_output:
        settings_warn_on_draft: true
      references_constraints: ["C-12"]
      priority: high

    - id: AC-17
      description: "SpecTemplate('api-endpoint') returns valid YAML that passes ParseSpec()"
      inputs:
        template: "api-endpoint"
      expected_output:
        parse_ok: true
        status: "draft"
      references_constraints: ["C-13"]
      priority: high

    - id: AC-18
      description: "SpecTemplate returns error for unknown template type"
      inputs:
        template: "nonexistent"
      expected_output:
        error_non_nil: true
      references_constraints: ["C-13"]
      priority: high

    - id: AC-19
      description: "settings.tier_overrides: {payment-intent: 1} parsed correctly — ResolveTier returns 1 for payment-intent"
      inputs:
        yaml: "settings:\n  tier_overrides:\n    payment-intent: 1"
        spec_id: "payment-intent"
      expected_output:
        resolved_tier: 1
      references_constraints: ["C-14"]
      priority: high

    - id: AC-20
      description: "When spec declares tier: 2 and tier_overrides assigns tier: 1 for that spec, a tier_conflict warning is emitted listing both values"
      inputs:
        spec_tier: 2
        tier_overrides: "payment-intent: 1"
        spec_id: "payment-intent"
      expected_output:
        warning_type: "tier_conflict"
        warning_lists_both_values: true
      references_constraints: ["C-14"]
      priority: high

    - id: AC-21
      description: "ScaffoldManifest output contains the literal string 'https://github.com/Hanalyx/specter' in the header comment. It does NOT contain 'spec-dd' or any other repo slug. The URL is verifiable with a substring check against the full scaffold YAML."
      inputs:
        name: "my-app"
        spec_ids: []
      expected_output:
        contains_url: "https://github.com/Hanalyx/specter"
        does_not_contain: "spec-dd"
      references_constraints: ["C-15"]
      priority: high

    - id: AC-22
      description: "ScaffoldManifest called with an empty spec_ids slice and candidatesCount=0 (greenfield) still emits `domains:` with a `default` entry whose description guides the operator to add spec IDs. Called with empty spec_ids but candidatesCount > 0 (drift), the default domain description names the discovery-but-parse-failure mismatch and points at `specter doctor`."
      inputs:
        case_greenfield: "spec_ids=[], candidates=0"
        case_drift: "spec_ids=[], candidates=3"
      expected_output:
        greenfield_has_domains_default: true
        greenfield_description_contains: "Add spec IDs"
        drift_description_contains: "could not be parsed"
      references_constraints: ["C-16"]
      priority: high

    - id: AC-23
      description: "Running `specter init --refresh` on a workspace with an existing `specter.yaml` that has `domains.default.specs: [\"spec-a\"]`, `settings.strict: true`, and a custom `domains.auth.specs: [\"spec-b\"]` — after adding spec-c to specs/ on disk — produces: `domains.default.specs: [\"spec-a\", \"spec-c\"]`, unchanged `settings.strict`, unchanged `domains.auth`. A pure helper RefreshManifestDomains(existing, discoveredIDs) returns the updated Manifest deterministically."
      inputs:
        existing: "domains.default.specs=[spec-a], domains.auth.specs=[spec-b], settings.strict=true"
        discovered: "[spec-a, spec-b, spec-c]"
      expected_output:
        default_specs: ["spec-a", "spec-c"]
        auth_specs: ["spec-b"]
        strict_preserved: true
      references_constraints: ["C-17", "C-18", "C-19"]
      priority: critical

    - id: AC-24
      description: "`specter init --refresh` on a manifest with `domains.default.specs: [\"spec-a\", \"spec-b\"]` when `spec-b` has been deleted from the workspace (no matching .spec.yaml on disk) produces `domains.default.specs: [\"spec-a\"]` and prints a summary line containing `-1 removed`. Dry-run variant produces the same output but the file on disk is unchanged."
      inputs:
        existing: "domains.default.specs=[spec-a, spec-b]"
        discovered: "[spec-a]"
      expected_output:
        default_specs: ["spec-a"]
        summary_contains: "-1 removed"
      references_constraints: ["C-18"]
      priority: high

    - id: AC-25
      description: "`specter init --refresh --dry-run` run on a workspace where a spec was added prints a diff to stdout indicating the proposed change (e.g. `+ spec-c`) but writes nothing. The file on disk (verified by reading + comparing to the pre-command contents) is byte-identical before and after."
      inputs:
        command: "specter init --refresh --dry-run"
        workspace_state: "existing manifest + one new spec on disk"
      expected_output:
        stdout_contains_diff: true
        file_unchanged_on_disk: true
        exit_code: 0
      references_constraints: ["C-20"]
      priority: high

    - id: AC-26
      description: "`specter init --refresh --force` exits non-zero with a message naming the flag conflict: `--refresh and --force are mutually exclusive`. No file write occurs."
      inputs:
        command: "specter init --refresh --force"
      expected_output:
        exit_code: "non-zero"
        stderr_contains: "mutually exclusive"
        file_unchanged_on_disk: true
      references_constraints: ["C-21"]
      priority: medium

    - id: AC-27
      description: "`specter init --install-hook` in a workspace whose `.git/` directory exists writes `.git/hooks/pre-push` and chmods it to 0755 (executable). Re-running the same command in-place replaces only the fenced region; content outside the markers is preserved byte-for-byte."
      inputs:
        command: "specter init --install-hook"
      expected_output:
        file_written: ".git/hooks/pre-push"
        mode: "0755"
        idempotent_re_run: true
      references_constraints: ["C-22"]
      priority: critical

    - id: AC-28
      description: "Pre-push hook installed by `init --install-hook` exits non-zero on a diff containing implementation file changes (`*.go`, `*.ts`, etc.) with no corresponding `@spec` / `@ac` annotation delta in the same diff. Diff containing only doc/spec/test changes (or any annotation delta) exits 0."
      inputs:
        diff_with_impl_only: "internal/foo/bar.go modified, no @spec/@ac change"
        diff_with_annotation_delta: "test file gained `// @ac AC-05`"
      expected_output:
        impl_only_exit_code: "non-zero"
        annotation_delta_exit_code: 0
      references_constraints: ["C-22"]
      priority: critical

    - id: AC-29
      description: "`git push --no-verify` bypasses the installed pre-push hook entirely and pushes successfully even on a diff that the hook would otherwise reject."
      inputs:
        diff: "implementation change with no annotation delta"
        invocation: "git push --no-verify"
      expected_output:
        push_succeeds: true
        hook_was_skipped: true
      references_constraints: ["C-22"]
      priority: high

    - id: AC-30
      description: "`specter init --ai claude` in a workspace with no AGENTS.md writes `CLAUDE.md` containing the inline v0.11 instruction body wrapped in fenced markers."
      inputs:
        command: "specter init --ai claude"
        workspace_has_agents_md: false
      expected_output:
        file_written: "CLAUDE.md"
        body_is_inline: true
        fenced_markers_present: true
      references_constraints: ["C-23"]
      priority: critical

    - id: AC-31
      description: "`specter init --ai codex` writes `AGENTS.md` containing the v0.11 instruction body wrapped in fenced markers."
      inputs:
        command: "specter init --ai codex"
      expected_output:
        file_written: "AGENTS.md"
        fenced_markers_present: true
      references_constraints: ["C-23"]
      priority: critical

    - id: AC-32
      description: "`specter init --ai cursor` writes `.cursor/rules/specter.md` (creating the parent directory if needed) containing the v0.11 instruction body wrapped in fenced markers."
      inputs:
        command: "specter init --ai cursor"
      expected_output:
        file_written: ".cursor/rules/specter.md"
        parent_dir_created: true
        fenced_markers_present: true
      references_constraints: ["C-23"]
      priority: critical

    - id: AC-33
      description: "`specter init --ai copilot` writes `.github/copilot-instructions.md` (creating the parent directory if needed) with the body capped at 4096 bytes (Copilot's code-review limit). Truncation, if needed, preserves the most-load-bearing rules at the top."
      inputs:
        command: "specter init --ai copilot"
      expected_output:
        file_written: ".github/copilot-instructions.md"
        body_size_le_4096_bytes: true
      references_constraints: ["C-23"]
      priority: high

    - id: AC-34
      description: "`specter init --ai gemini` writes `GEMINI.md` containing the v0.11 instruction body wrapped in fenced markers."
      inputs:
        command: "specter init --ai gemini"
      expected_output:
        file_written: "GEMINI.md"
        fenced_markers_present: true
      references_constraints: ["C-23"]
      priority: critical

    - id: AC-35
      description: "Re-running `specter init --ai <tool>` in a workspace where the target file has been edited outside the fenced region replaces only the content between the markers; user-authored content outside the markers is preserved byte-for-byte."
      inputs:
        first_run: "specter init --ai codex"
        user_edit: "appended user notes after </specter:end>"
        second_run: "specter init --ai codex"
      expected_output:
        out_of_fence_content_preserved: true
        in_fence_content_replaced: true
      references_constraints: ["C-23"]
      priority: critical

    - id: AC-36
      description: "`specter init --ai claude` in a workspace where `AGENTS.md` already exists writes `CLAUDE.md` whose fenced body is `@AGENTS.md` (Claude's import directive) plus an empty `## Claude-specific notes` section, NOT the inline instruction body. This avoids duplicating the instruction template across both files."
      inputs:
        workspace_has_agents_md: true
        command: "specter init --ai claude"
      expected_output:
        file_written: "CLAUDE.md"
        fenced_body_contains: "@AGENTS.md"
        fenced_body_omits_inline_template: true
      references_constraints: ["C-23"]
      priority: high

    - id: AC-37
      description: "ParseManifest accepts `settings.strictness: annotation`, `settings.strictness: threshold`, and `settings.strictness: zero-tolerance` cleanly. When unset, the parsed Manifest carries `Settings.Strictness == \"threshold\"` (default applied)."
      inputs:
        manifest_strictness_annotation: "settings.strictness: annotation"
        manifest_strictness_zero_tolerance: "settings.strictness: zero-tolerance"
        manifest_unset: "settings: { specs_dir: specs }"
      expected_output:
        annotation_parses: true
        zero_tolerance_parses: true
        unset_default: "threshold"
      references_constraints: ["C-24"]
      priority: critical

    - id: AC-38
      description: "ParseManifest rejects `settings.strictness: bogus` with a clear error naming the field and the three valid values. No partial parse; the function returns an error and a nil Manifest."
      inputs:
        manifest: "settings.strictness: bogus"
      expected_output:
        error_contains: "settings.strictness"
        error_lists_valid_values: ["annotation", "threshold", "zero-tolerance"]
      references_constraints: ["C-24"]
      priority: critical

    - id: AC-39
      description: "ParseManifest accepts `settings.tests_glob` as either a single string (`tests_glob: \"tests/**/*.py\"`) or a list (`tests_glob: [\"tests/**/*.py\", \"integration/**/*.py\"]`). Both forms normalize into `Settings.TestsGlob []string`."
      inputs:
        manifest_string_form: "settings.tests_glob: tests/**/*.py"
        manifest_list_form: "settings.tests_glob: [tests/**/*.py, integration/**/*.py]"
      expected_output:
        string_form_normalized_length: 1
        list_form_normalized_length: 2
      references_constraints: ["C-25"]
      priority: critical

    - id: AC-40
      description: "ParseManifest with a typo'd settings key (e.g., `test_glob:` instead of `tests_glob:`) returns an error naming the offending key, the closest valid key (`did you mean: tests_glob?`), and exits parse-time. Empty workspace under `coverage --strict` no longer silently reports 0% — the manifest fails to parse first."
      inputs:
        manifest: "settings.test_glob: tests/**/*.py"
      expected_output:
        error_contains: "test_glob"
        error_did_you_mean: "tests_glob"
        exit_code: "non-zero"
      references_constraints: ["C-26"]
      priority: critical

  depends_on:
    - spec_id: spec-parse
      version_range: "^1.0.0"
      relationship: requires
    - spec_id: spec-sync
      version_range: "^1.0.0"
      relationship: requires

  changelog:
    - version: "1.8.0"
      date: "2026-04-25"
      author: "specter-team"
      type: minor
      description: "v0.11 settings hardening. Add C-24/AC-37..38 for `settings.strictness` (Feature 5: three-level enum gating coverage --strict semantics). Add C-25/AC-39 for `settings.tests_glob` (closes GH #78: default test-discovery pattern, removes the silent-0% UX hole when --tests is unset). Add C-26/AC-40 for unknown-key rejection in settings (closes GH #76: typo'd keys now error with did-you-mean). Together these close a class of silent-failure footguns where users guess plausible setting names and get no signal."
    - version: "1.7.0"
      date: "2026-04-25"
      author: "specter-team"
      type: minor
      description: "v0.11 init bundle. Add C-22/AC-27..29 for `init --install-hook`: writes a git pre-push hook that blocks pushes with implementation diffs lacking @spec/@ac annotation deltas. Add C-23/AC-30..36 for `init --ai <tool>`: writes per-tool AI instruction file (claude/codex/cursor/copilot/gemini) with idempotent fenced markers so re-runs preserve out-of-fence content. Both use the `<!-- specter:begin v1 --> ... <!-- specter:end -->` block format. Closes the v0.10.x docs/code drift class by giving the AI a concise project guide that asks Specter for spec content on demand instead of dumping it pre-loaded."
    - version: "1.6.0"
      date: "2026-04-20"
      author: "specter-team"
      type: minor
      description: "Add C-17 through C-21 and AC-23 through AC-26 for `specter init --refresh`. Non-destructive manifest update: rescans specs_dir, refreshes only domains.default.specs, preserves every other field including custom domains, settings, and tier overrides. `--dry-run` prints the proposed diff without writing. `--refresh` and `--force` are mutually exclusive. Driven by jwtms migration testing where operators needed to update domains after adding specs but couldn't without losing manual config."
    - version: "1.5.0"
      date: "2026-04-19"
      author: "specter-team"
      type: minor
      description: "Add C-16/AC-22: ScaffoldManifest always emits a `domains:` section, with a placeholder default domain when spec_ids is empty. Fixes the silent-exclusion footgun where an empty domains map caused `specter sync` to ignore every later spec the operator added. New ScaffoldManifestWithContext variant takes candidatesCount so the placeholder description names the schema-drift case distinctly."
    - version: "1.4.0"
      date: "2026-04-18"
      author: "specter-team"
      type: patch
      description: "Add C-15/AC-21 pinning the canonical Specter GitHub URL in ScaffoldManifest output (was spec-dd, should be specter)."
    - version: "1.3.0"
      date: "2026-04-14"
      author: "specter-team"
      type: minor
      description: "Add C-14/AC-19-20: settings.tier_overrides parsing and tier_conflict warning emission"
    - version: "1.2.0"
      date: "2026-04-14"
      author: "specter-team"
      type: minor
      description: "Add C-13/AC-17-18: spec file templates for api-endpoint, service, auth, data-model"
    - version: "1.1.0"
      date: "2026-04-14"
      author: "specter-team"
      type: minor
      description: "Add C-11/AC-15 settings.strict and C-12/AC-16 settings.warn_on_draft fields"
    - version: "1.0.0"
      date: "2026-04-03"
      author: "specter-team"
      type: initial
      description: "Initial spec for project manifest, spec registry, and domain grouping"
