spec:
  id: spec-check
  version: "1.2.0"
  status: approved
  tier: 1

  context:
    system: Specter toolchain
    feature: Spec type checker
    description: >
      The core analysis tool. Walks the dependency graph produced by spec-resolve
      and validates semantic consistency across specs. MVP focuses on deterministic,
      structural checks. AI-assisted semantic checks are deferred to a later phase.
    dependencies:
      - "deep-diff (1.x) or custom tree differ"
    related_specs:
      - "spec-parse.spec.yaml"
      - "spec-resolve.spec.yaml"
    assumptions:
      - "Input is a validated SpecGraph from spec-resolve"
      - "Constraints with validation rules enable deterministic checking"
      - "Free-text constraints are checked by AI in a later phase"

  objective:
    summary: >
      Perform structural type-checking across the spec dependency graph.
      Detect orphan constraints, structural conflicts between connected specs,
      breaking changes between spec versions, and (opt-in) test-annotation
      references that do not match any parsed spec.
    scope:
      includes:
        - "Orphan constraint detection (constraints not referenced by any AC)"
        - "Structural conflict detection between dependent specs"
        - "Breaking change detection (compare current spec to previous version)"
        - "Tier-aware severity (Tier 1 = error, Tier 3 = warning)"
        - "Diagnostic output with spec ID, constraint ID, and explanation"
        - "Test-annotation cross-reference (opt-in via --test / -t): scan test files, flag @spec and @ac references that do not match any parsed spec"
      excludes:
        - "Semantic conflict detection (AI-assisted, Phase 8)"
        - "Gap detection (uncovered input paths, Phase 8)"
        - "Cross-project analysis"
        - "Auto-fixing or auto-resolution of conflicts"
        - "Source-only annotation detection — deferred to v0.12 `unreachable_annotation`"

  constraints:
    - id: C-01
      description: "MUST detect all orphan constraints in every spec (constraints with no AC reference)"
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST respect tier-based severity: Tier 1 orphans are errors, Tier 3 are info"
      type: technical
      enforcement: error

    - id: C-03
      description: "MUST detect structural conflicts where a downstream spec contradicts an upstream constraint"
      type: technical
      enforcement: error

    - id: C-04
      description: "MUST classify spec-version changes as breaking/additive/patch per SDD versioning rules"
      type: technical
      enforcement: error

    - id: C-05
      description: "MUST NOT produce false positives on valid specs (zero false positive rate for structural checks)"
      type: technical
      enforcement: error

    - id: C-06
      description: "MUST NOT depend on any CLI framework — pure function from SpecGraph to Diagnostic[]"
      type: technical
      enforcement: error

    - id: C-07
      description: "MUST support strict mode (CheckOptions.Strict=true) that upgrades all warning-severity diagnostics to error severity"
      type: technical
      enforcement: error

    - id: C-08
      description: "MUST support warn_on_draft mode (CheckOptions.WarnOnDraft=true) that emits a warning diagnostic for every spec with status: draft"
      type: technical
      enforcement: error

    - id: C-09
      description: "MUST support opt-in test-annotation cross-reference mode (`check --test` / `-t`) that scans test files for `@spec <id>` and `@ac AC-NN` source comments, and emits diagnostics for references that do not match any parsed spec; diagnostic kinds are `unknown_spec_ref` (no spec with that id), `unknown_ac_ref` (spec exists but AC id is not declared), and `malformed_ac_id` (AC id does not match `^AC-\\d{2,}$`)"
      type: technical
      enforcement: error

  depends_on:
    - spec_id: spec-parse
      version_range: "^1.0.0"
      relationship: requires
    - spec_id: spec-resolve
      version_range: "^1.0.0"
      relationship: requires

  acceptance_criteria:
    - id: AC-01
      description: "Spec with constraint C-03 not referenced by any AC produces OrphanConstraint diagnostic"
      inputs:
        spec: "spec with C-01 (ref by AC-01), C-02 (ref by AC-02), C-03 (not referenced)"
      expected_output:
        type: "Diagnostic"
        kind: "orphan_constraint"
        constraint_id: "C-03"
      references_constraints: ["C-01"]
      priority: critical

    - id: AC-02
      description: "Tier 1 orphan constraint is reported as error; Tier 3 as info"
      inputs:
        tier_1_spec: "tier 1, orphan C-03"
        tier_3_spec: "tier 3, orphan C-03"
      expected_output:
        tier_1_severity: "error"
        tier_3_severity: "info"
      references_constraints: ["C-01", "C-02"]
      priority: high

    - id: AC-03
      description: "Spec A requires field X (C-01: MUST), Spec B (depends on A) AC handles X being absent = structural conflict"
      inputs:
        spec_a: "constraint C-01: email MUST be required"
        spec_b: "depends on A, AC-01 handles case where email is absent"
      expected_output:
        type: "Diagnostic"
        kind: "structural_conflict"
      references_constraints: ["C-03"]
      priority: critical

    - id: AC-04
      description: "Removing a field between versions is classified as MAJOR (breaking)"
      inputs:
        v1: "spec with field 'legacy_token'"
        v2: "spec without 'legacy_token'"
      expected_output:
        change_type: "breaking"
        requires_major_bump: true
      references_constraints: ["C-04"]
      priority: high

    - id: AC-05
      description: "Adding an optional field between versions is classified as MINOR (additive)"
      inputs:
        v1: "spec without 'refresh_token'"
        v2: "spec with optional 'refresh_token'"
      expected_output:
        change_type: "additive"
        requires_minor_bump: true
      references_constraints: ["C-04"]
      priority: high

    - id: AC-06
      description: "Spec where all constraints are referenced by ACs produces zero orphan diagnostics"
      inputs:
        spec: "all constraints referenced"
      expected_output:
        orphan_count: 0
      references_constraints: ["C-05", "C-06"]
      priority: critical

    - id: AC-07
      description: "CheckOptions.Strict=true upgrades all warning-severity orphan diagnostics to error"
      inputs:
        spec: "tier 2 spec (orphans are normally warnings)"
        opts: "CheckOptions{Strict: true}"
      expected_output:
        orphan_severity: "error"
        summary_errors_gt_zero: true
      references_constraints: ["C-07"]
      priority: high

    - id: AC-08
      description: "CheckOptions.WarnOnDraft=true emits draft_spec warning for specs with status: draft"
      inputs:
        spec: "spec with status: draft"
        opts: "CheckOptions{WarnOnDraft: true}"
      expected_output:
        diagnostic_kind: "draft_spec"
        severity: "warning"
      references_constraints: ["C-08"]
      priority: high

    - id: AC-09
      description: "`specter check --test` on a workspace whose test file carries `// @spec bogus-spec` (no such spec exists) emits one `unknown_spec_ref` diagnostic naming the offending spec id and the test file"
      inputs:
        test_file: "contains '// @spec bogus-spec'"
        workspace_specs: "no spec with id bogus-spec"
      expected_output:
        diagnostic_kind: "unknown_spec_ref"
        contains_spec_id: "bogus-spec"
        contains_file_path: true
        exit_code_nonzero: true
      references_constraints: ["C-09"]
      priority: critical

    - id: AC-10
      description: "`specter check --test` on a workspace where a test file carries `// @spec real-spec` + `// @ac AC-99` but real-spec declares no AC-99 emits one `unknown_ac_ref` diagnostic"
      inputs:
        test_file: "contains '// @spec real-spec' and '// @ac AC-99'"
        workspace_specs: "real-spec declares AC-01 only"
      expected_output:
        diagnostic_kind: "unknown_ac_ref"
        contains_ac_id: "AC-99"
        contains_spec_id: "real-spec"
        exit_code_nonzero: true
      references_constraints: ["C-09"]
      priority: critical

    - id: AC-11
      description: "`specter check --test` on a test file carrying malformed AC ids (`// @ac AC-1` or `// @ac ac-01`) emits `malformed_ac_id` diagnostics for each"
      inputs:
        test_file: "contains '// @ac AC-1' and '// @ac ac-01'"
      expected_output:
        diagnostic_kind: "malformed_ac_id"
        malformed_count: 2
        exit_code_nonzero: true
      references_constraints: ["C-09"]
      priority: high

    - id: AC-12
      description: "`specter sync --strict` routes strict mode through to the check phase, including the `check --test` cross-reference pass; a workspace with an unknown_spec_ref fails `sync --strict`"
      inputs:
        test_file: "contains '// @spec bogus-spec'"
        invocation: "specter sync --strict"
      expected_output:
        sync_phase_check_fails: true
        exit_code_nonzero: true
      references_constraints: ["C-09"]
      priority: high

  changelog:
    - version: "1.2.0"
      date: "2026-04-25"
      author: "specter-team"
      type: minor
      description: "Add C-09 and AC-09..AC-12 — opt-in test-annotation cross-reference (`check --test` / `-t`). Three diagnostic kinds: unknown_spec_ref, unknown_ac_ref, malformed_ac_id. `sync --strict` routes the flag through so CI catches broken test annotations."
    - version: "1.1.0"
      date: "2026-04-14"
      author: "specter-team"
      type: minor
      description: "Add C-07/AC-07 strict mode (warnings-as-errors) and C-08/AC-08 warn_on_draft mode"
    - version: "1.0.0"
      date: "2026-03-28"
      author: "specter-team"
      type: initial
      description: "Initial spec for the Specter type checker (structural checks only)"
