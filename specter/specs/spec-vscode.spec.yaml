spec:
  id: spec-vscode
  version: "1.3.0"
  status: draft
  tier: 2

  context:
    system: Specter toolchain
    feature: VS Code extension for spec-driven development
    description: >
      A VS Code extension that makes Specter a first-class citizen in the editor.
      The core tension it resolves: AI agents naturally consume Specter's
      machine-readable output; human developers need a richer, more contextual
      representation of the same information. The extension serves both — it is
      the human collaborator's window into AI-native specification infrastructure.

      Architecture: TypeScript extension (~800 lines), thin wrapper over the specter
      CLI JSON API. No LSP process. Per-workspace SpecterClient instances. On-save
      full diagnostics, on-type parse-only feedback, transparent binary auto-download.

    assumptions:
      - "The specter CLI is the source of truth — extension logic never reimplements pipeline rules"
      - "All AI features degrade gracefully when no LM API is available"
      - "The extension activates only in workspaces containing specter.yaml or *.spec.yaml"
      - "TypeScript is the implementation language; no bundled Go binary"
      - ".spec.yaml files remain valid YAML — no custom language ID required"
    dependencies:
      - "vscode engine ^1.85.0"
      - "fsnotify (via specter binary)"
      - "github.com/fsnotify/fsnotify (already in specter binary)"
    related_specs:
      - "spec-parse"
      - "spec-coverage"
      - "spec-check"
      - "spec-diff"
      - "spec-sync"
      - "spec-explain"

  objective:
    summary: >
      Provide inline coverage indicators, spec diagnostics, annotation assistance,
      intent drift detection, and an AI context bridge directly in the editor —
      making the spec-to-test-to-AI feedback loop visible and actionable without
      leaving VS Code.
    scope:
      includes:
        - "Specter binary discovery and auto-download from GitHub Releases"
        - "On-save diagnostics for .spec.yaml files (parse + check)"
        - "On-type parse-only feedback with 400ms debounce"
        - "Coverage gutter decorations on both spec and test files"
        - "Hover providers: constraint linkage, AC description, spec context"
        - "Annotation completions (@spec, @ac) in test files"
        - "Go-to-definition for depends_on.spec_id and references_constraints"
        - "Tree view panel: specs → ACs → test files"
        - "Status bar item: spec count, coverage %, failing count"
        - "Human-readable insight WebviewPanel with per-spec health cards"
        - "Intent drift detection: surfaces when a spec AC changed since annotation was added"
        - "Annotation quick-fix: CodeAction to insert @spec/@ac above unannotated test functions"
        - "Copy spec context for AI command (clipboard-formatted prompt preamble)"
        - "AC suggestion heuristic (tf-idf against spec corpus, no LM call)"
        - "Frictionless onboarding walkthrough for projects with no specs"
        - "File decoration provider: tier badges and coverage health in Explorer"
      excludes:
        - "LSP server (deferred — TypeScript extension API is sufficient for v1)"
        - "JetBrains / Neovim support (separate effort)"
        - "Publishing to Open VSX (v2)"
        - "Multi-agent spec locking (requires coordination layer)"
        - "Coverage trend sparklines (v2 — needs persistent result storage)"
        - "AI confidence scoring (v2 — needs calibration data)"
        - "Human vs AI authorship indicators (v2 — git blame heuristics fragile)"

  constraints:
    - id: C-01
      description: "MUST discover the specter binary in this resolution order: workspace setting specter.binaryPath → PATH → ~/.specter/bin/specter → auto-download from GitHub Releases. MUST verify SHA256 checksum on auto-download. MUST validate the resolved binary (magic-byte check and `--version` probe) regardless of resolution source; a corrupt file on PATH must not slip through as a valid binary. MUST expose a `Specter: Re-download CLI` command and MUST surface CLI invocation failures via an output channel reachable from the status bar (never leave the UI stuck on an indefinite loading state)."
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST activate only on workspaceContains:**/specter.yaml or workspaceContains:**/*.spec.yaml — MUST NOT activate on every YAML file"
      type: technical
      enforcement: error

    - id: C-03
      description: "MUST use document selector {language: 'yaml', pattern: '**/*.spec.yaml'} — MUST NOT register a new language ID, preserving existing YAML tooling"
      type: technical
      enforcement: error

    - id: C-04
      description: "MUST run specter parse --json on type (debounced 400ms) and specter check --json + specter coverage --json on save. MUST serialize invocations per-workspace — never two concurrent specter processes against the same manifest."
      type: technical
      enforcement: error

    - id: C-05
      description: "MUST replace (not append) diagnostics atomically on each run. MUST delete diagnostics on file rename or delete. MUST maintain one DiagnosticCollection per workspace folder."
      type: technical
      enforcement: error

    - id: C-06
      description: "MUST discover specter.yaml by walking up from the open file's directory. MUST maintain one SpecterClient per workspace folder for multi-root workspace support."
      type: technical
      enforcement: error

    - id: C-07
      description: "MUST render coverage status on each AC line in spec files: green (covered), red (uncovered), grey dash (gap: true). MUST render gutter icons on test functions annotated with @spec/@ac."
      type: business
      enforcement: error

    - id: C-08
      description: "MUST provide CompletionItemProvider for // @spec and // @ac in test files, ranked by directory proximity and filename token match against spec IDs."
      type: business
      enforcement: error

    - id: C-09
      description: "MUST provide DefinitionProvider: depends_on[].spec_id → target .spec.yaml file; references_constraints[] → constraint line within current spec."
      type: business
      enforcement: error

    - id: C-10
      description: "MUST provide a TreeDataProvider panel (Specter sidebar) with hierarchy: spec file → AC nodes (with coverage icon) → test files. MUST provide a status bar item showing spec count, coverage %, and failing count. Status bar MUST use statusBarItem.warningBackground when any T1/T2 spec fails threshold."
      type: business
      enforcement: error

    - id: C-11
      description: "MUST provide a WebviewPanel (Specter Insights) rendering per-spec health cards in human language: sentence summary of what needs to be done, AC list with descriptions (not just IDs), constraint callout for uncovered ACs, last-change context from specter diff output."
      type: business
      enforcement: error

    - id: C-12
      description: "MUST detect intent drift: when a @ac annotation references an AC whose spec file has changed since the annotation was last git-committed, surface a distinct gutter icon with a hover showing the AC description at both the baseline commit and HEAD, classified as breaking/additive/patch via specter diff."
      type: business
      enforcement: error

    - id: C-13
      description: "MUST provide a CodeActionsProvider for unannotated test functions (DiagnosticSeverity.Information, not Warning). Quick fix inserts // @spec <best-guess> + // @ac AC- snippet with tab stop."
      type: business
      enforcement: error

    - id: C-14
      description: "MUST provide a 'Copy spec context for AI' command that formats the current spec's ACs and constraints as a markdown prompt preamble and copies to clipboard. MUST work with zero network calls."
      type: business
      enforcement: error

    - id: C-15
      description: "MUST provide a frictionless onboarding walkthrough (vscode Walkthrough contribution) for workspaces with no .spec.yaml files. MUST NOT show the walkthrough if specs already exist."
      type: business
      enforcement: warning

    - id: C-16
      description: "MUST provide HoverProvider for constraint IDs in spec files showing: constraint text, which ACs reference it, and whether those ACs are covered. MUST warn prominently if no AC references the constraint."
      type: business
      enforcement: error

    - id: C-17
      description: "MUST provide FileDecorationProvider for .spec.yaml nodes in the Explorer showing tier badge (T1/T2/T3) and coverage health color. MUST use VS Code ThemeIcon identifiers where available, custom SVG only for tier badges."
      type: business
      enforcement: warning

    - id: C-18
      description: "On-save diagnostic target: under 800ms for parse + check on a single file in repos under 500 specs. Coverage may complete asynchronously in a second pass. MUST use AbortController to cancel in-flight processes on deactivation."
      type: technical
      enforcement: error

    - id: C-19
      description: "MUST use non-modal notifications. Status bar update only for transient errors. showInformationMessage (non-modal, rate-limited 1/spec/60s) for T2/T3 threshold drops. showWarningMessage for breaking spec changes. showErrorMessage modal only for binary-not-found at startup."
      type: business
      enforcement: error

    - id: C-20
      description: "MUST provide AC suggestion heuristic using tf-idf scoring against the loaded spec corpus. Suggestions surface as CodeLens above unannotated test functions. MUST NOT require an LM API call or network access for this feature."
      type: technical
      enforcement: warning

    - id: C-21
      description: "The Coverage tree view MUST render a visible state message when there is no coverage data to display — whether because no specter.yaml was found in the workspace, no .spec.yaml files exist, or every spec failed to parse. The panel MUST NOT remain silently empty. The message MUST name the reason (missing manifest / no specs / parse failures) and point the user at a concrete action (specter init, specter reverse, or the Problems panel). This is the same discipline applied to the CLI's 'No .spec.yaml files found' message in v0.7.1 — no dead-end output."
      type: technical
      enforcement: error

    - id: C-22
      description: "Every command declared in package.json contributes.commands[].command MUST have a corresponding vscode.commands.registerCommand(id, handler) call in extension.ts. Parity MUST be enforced by an automated test that runs in CI. Rationale: the 'declared but unregistered' failure mode has shipped three times in seven days (specter.revealInTree, specter.runReverse, specter.openQuickStart) — a one-time test eliminates the class."
      type: technical
      enforcement: error

    - id: C-23
      description: "Every disposable resource returned by a VS Code factory function (createTextEditorDecorationType, createOutputChannel, createStatusBarItem, createTreeView, createDiagnosticCollection, createWebviewPanel, createFileSystemWatcher, registerCommand, registerHoverProvider, registerCompletionItemProvider, registerCodeLensProvider, registerDefinitionProvider, registerCodeActionsProvider, workspace.onDid*, window.onDid*) MUST be pushed to ctx.subscriptions so it is disposed on extension deactivation. Rationale: orphan disposables leak across Developer: Reload Window cycles and can produce subtle duplicate-event bugs."
      type: technical
      enforcement: error

    - id: C-24
      description: "Auto-downloaded CLI binaries MUST be installed only after SHA256 checksum verification succeeds against the checksums.txt accompanying the GitHub release. If checksums.txt is unreachable, malformed, or does not contain an entry for the exact archive being downloaded, installation MUST fail with a modal error — silent fallback to 'install without verifying' is prohibited. Rationale: the prior fallback let a MITM attacker selectively block checksums.txt while delivering a tampered archive; the extension would install it."
      type: business
      enforcement: error

    - id: C-25
      description: "Extension activation MUST resolve the CLI binary (including auto-download, subject to specter.autoDownload) even when the current workspace contains no .spec.yaml files and no specter.yaml. Commands like specter.runReverse are meaningful in an empty workspace — the user invokes them to bootstrap. Activation MUST also fire the onboarding walkthrough when the workspace has no specs and no manifest; the gate MUST NOT be placed behind a mutually-exclusive activation check."
      type: technical
      enforcement: error

    - id: C-26
      description: "Async and synchronous error paths in editor hooks (onDidChangeTextDocument, onDidSaveTextDocument, onDidChangeActiveTextEditor, hover/completion/codeLens providers, drift scanner) MUST route caught errors to the Specter Output channel with a timestamp and context string, NOT silently discard them. `catch {}`, `catch (_) {}`, and `.catch(() => {})` on promise chains that can hide real failures are prohibited."
      type: business
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: "Extension activates in a workspace containing specter.yaml; does NOT activate in a workspace with only generic YAML files"
      references_constraints: ["C-02"]
      priority: critical

    - id: AC-02
      description: "specter.binaryPath workspace setting overrides PATH lookup; if neither resolves, extension auto-downloads from GitHub Releases with SHA256 verification and shows progress notification"
      references_constraints: ["C-01"]
      priority: critical

    - id: AC-03
      description: "Typing in a .spec.yaml file triggers specter parse --json after 400ms debounce; errors appear in the Problems panel within 800ms of stopping typing"
      references_constraints: ["C-03", "C-04", "C-18"]
      priority: critical

    - id: AC-04
      description: "Saving a .spec.yaml file triggers specter check --json and specter coverage --json; diagnostics are replaced atomically (no duplicates or stale entries)"
      references_constraints: ["C-04", "C-05"]
      priority: critical

    - id: AC-05
      description: "Each AC line in a spec file shows a gutter icon: green circle (covered), red circle (uncovered), grey dash (gap: true). End-of-line text decoration shows test count for covered ACs."
      references_constraints: ["C-07"]
      priority: critical

    - id: AC-06
      description: "Hovering over a constraint ID (e.g., C-01) in a spec file shows: constraint description, which ACs reference it, and coverage status of those ACs. If no AC references it, hover card says 'No AC references this constraint.'"
      references_constraints: ["C-16"]
      priority: high

    - id: AC-07
      description: "Typing // @spec in a test file triggers completions showing spec IDs ranked by directory proximity; selecting a completion inserts the spec ID"
      references_constraints: ["C-08"]
      priority: critical

    - id: AC-08
      description: "Typing // @ac in a test file triggers completions showing AC IDs and descriptions from the spec referenced by the nearest @spec annotation above"
      references_constraints: ["C-08"]
      priority: critical

    - id: AC-09
      description: "Hovering over @ac AC-01 in a test file shows the full AC description, whether it is currently covered, and which other test files also cover it"
      references_constraints: ["C-08"]
      priority: high

    - id: AC-10
      description: "Go-to-definition on a spec_id in depends_on navigates to the target .spec.yaml file; Go-to-definition on a constraint ID in references_constraints jumps to that constraint's line in the current spec"
      references_constraints: ["C-09"]
      priority: high

    - id: AC-11
      description: "Specter sidebar tree view shows: spec files as root nodes, AC children with green/red/grey icons and test count, test file leaves. Clicking a tree node opens the corresponding file at the correct line."
      references_constraints: ["C-10"]
      priority: high

    - id: AC-12
      description: "Status bar item shows 'Specter: N specs · X% · F failing'. Background is statusBarItem.warningBackground when any T1/T2 spec fails threshold. Clicking the item opens the Specter sidebar."
      references_constraints: ["C-10"]
      priority: high

    - id: AC-13
      description: "Specter Insights panel (opened from the status bar or tree view) shows a health card per failing spec with: sentence summary ('spec-payment has 3 uncovered ACs. Tier 1 requires 100%.'), AC list with full descriptions, constraint callout for uncovered ACs, and last-change context."
      references_constraints: ["C-11"]
      priority: high

    - id: AC-14
      description: "When a test file is opened and a @ac annotation references an AC whose spec has changed since the annotation was last committed, a 'spec drifted' gutter icon appears. Hovering shows the AC description at baseline and HEAD, classified as breaking/additive/patch."
      references_constraints: ["C-12"]
      priority: high

    - id: AC-15
      description: "A test function with no @spec annotation shows a DiagnosticSeverity.Information diagnostic. The associated quick fix inserts '// @spec <best-guess>' and '// @ac AC-' with a tab stop above the function."
      references_constraints: ["C-13"]
      priority: high

    - id: AC-16
      description: "'Copy spec context for AI' command formats the current spec's tier, objective, constraints, and AC list as a markdown ## Spec Contract block and copies to clipboard. Works with no network access."
      references_constraints: ["C-14"]
      priority: critical

    - id: AC-17
      description: "In a workspace with no .spec.yaml files, a VS Code walkthrough appears with steps: discover specs → run specter reverse → annotate first test → run specter sync. Walkthrough does NOT appear if specs already exist."
      references_constraints: ["C-15"]
      priority: medium

    - id: AC-18
      description: "A T1/T2 spec dropping below threshold after a test file save triggers a non-modal showInformationMessage. Same spec fires at most once per 60 seconds. T3 threshold drops produce only a status bar update, no toast."
      references_constraints: ["C-19"]
      priority: high

    - id: AC-19
      description: "A breaking spec change detected via specter diff after a .spec.yaml save triggers a non-modal showWarningMessage with 'View Diff' and 'Dismiss' actions. Binary-not-found at startup triggers a modal showErrorMessage."
      references_constraints: ["C-19"]
      priority: high

    - id: AC-20
      description: ".spec.yaml files in the Explorer panel show a tier badge (T1/T2/T3) and a coverage health color decoration without opening the Specter sidebar"
      references_constraints: ["C-17"]
      priority: medium

    - id: AC-21
      description: "CodeLens above unannotated test functions shows top-2 AC suggestions ranked by tf-idf against the spec corpus. Suggestions are computed offline with no LM API call. Clicking a suggestion inserts the annotation."
      references_constraints: ["C-20"]
      priority: medium

    - id: AC-22
      description: "Multi-root workspace: each workspace folder has its own SpecterClient, DiagnosticCollection, and manifest. Diagnostics from folder A do not appear in folder B."
      references_constraints: ["C-06"]
      priority: high

    - id: AC-23
      description: "A corrupt text file at ~/.specter/bin/specter (e.g. an HTTP error body saved as the binary) with chmod +x is rejected as invalid regardless of how it was resolved (cache, PATH, workspaceSetting). isBinaryFile returns false for files that do not start with ELF/Mach-O/PE magic bytes."
      references_constraints: ["C-01"]
      priority: critical

    - id: AC-24
      description: "When specter coverage fails at runtime, the status bar exits the 'loading…' state and shows an error indicator. Clicking the indicator opens the Specter output channel with the failure details. A `Specter: Re-download CLI` command is available in the command palette to recover from a corrupt cached binary."
      references_constraints: ["C-01"]
      priority: high

    - id: AC-25
      description: "A `Specter: Add CLI to Shell PATH` command detects the user's shell ($SHELL env) and maps bash→.bashrc (or .bash_profile on darwin), zsh→.zshrc, fish→config.fish. Fish uses fish_add_path syntax; bash/zsh use export PATH. Unknown shells return null so the handler falls back to clipboard-copying the manual export line."
      references_constraints: ["C-01"]
      priority: high

    - id: AC-26
      description: "Appending to the shell rc file is idempotent — isPathAlreadyPresent ignores commented lines and detects an existing reference to the bin dir in any non-comment line, so running the command twice adds only one block."
      references_constraints: ["C-01"]
      priority: high

    - id: AC-27
      description: "On activation, when the cached CLI is at ~/.specter/bin and the detected shell's rc file exists but does not reference that dir, the extension shows a non-modal info prompt offering to add the CLI to shell PATH. The prompt offers 'Add to PATH' (runs specter.addCliToShellPath) and 'Don't show again' (persists an opt-out flag in globalState so future activations skip the prompt). Unknown shells, missing rc files, and already-present references suppress the prompt without user interaction."
      references_constraints: ["C-01"]
      priority: medium

    - id: AC-28
      description: "When the Coverage tree provider is queried and no CoverageReport is loaded, getChildren() returns exactly one synthetic 'message' node. The message text explains that coverage data is not available and names one or more concrete next steps (e.g. 'Run specter init' or 'Open Problems panel'). Tested via the pure buildTreeNodes-equivalent function, not via VS Code runtime mocks."
      references_constraints: ["C-21"]
      priority: high

    - id: AC-29
      description: "When the loaded CoverageReport has parseErrors[] non-empty (CLI ran but specs failed to parse), the tree provider returns one synthetic 'message' node whose text names the parse-failure count and points at the Problems panel / Output channel. Distinguished from AC-28 (not-yet-run) and AC-30 (no-specs-yet) by the presence of structured parse failures in the report."
      references_constraints: ["C-21"]
      priority: high

    - id: AC-30
      description: "When the loaded CoverageReport has entries.length === 0 and parseErrors is empty or absent (CLI ran successfully but there are no specs in the workspace), the tree provider returns one synthetic 'message' node suggesting `specter init` or `specter reverse src/`. Distinct from AC-28: coverage has been run; distinct from AC-29: no specs failed, there just aren't any."
      references_constraints: ["C-21"]
      priority: high

    - id: AC-31
      description: "`specter.runSync` emits a completion message that honestly reflects the outcome. If every folder's coverage step succeeded, the user sees 'Specter sync complete.' If any folder entered the error state (CLI failed or parseErrors returned), the completion message is phrased as a failure ('Specter sync finished with errors — see Output channel.') and surfaces via a warning-level notification rather than an info toast."
      references_constraints: ["C-19"]
      priority: high

    - id: AC-32
      description: "Hovering an `@ac AC-XX` annotation in a test file produces a hover that lists the actual covering test files for that AC — read from the workspace's current CoverageReport entry's testFiles, filtered to files whose annotations reference this (spec, AC) pair. The hover is 'uncovered' only when the AC is genuinely absent from the report's coveredACs. Fixes the v0.8.x regression where hovers always showed the empty-state content because the caller passed coveredByFiles: []."
      references_constraints: ["C-10"]
      priority: high

    - id: AC-33
      description: "Clicking a spec node or a test-file leaf in the Coverage sidebar opens the corresponding file in an editor tab. The spec node uses the path from CoverageReport entries[*].specFile (new in coverage v1.5.0); the test-file leaf uses entry.testFiles[i]. Relative paths emitted by the CLI are resolved against the workspace folder root before being passed to vscode.Uri.file. Previously, test-file leaves rendered as undefined/null (runtime shape mismatch) or passed a relative path straight to Uri.file, which produced a non-existent '/watch_test.go' URI and the 'file not found' editor error."
      references_constraints: ["C-10"]
      priority: high

    - id: AC-34
      description: "When `specter coverage --json` returns parseErrors, the extension pushes one VS Code diagnostic per error into the per-folder DiagnosticCollection (keyed by the absolute file URI after resolving relative CLI paths). VS Code's Problems panel shows one clickable entry per broken spec, positioned at the reported line/column, labelled with the error type prefix. Previously the Problems panel stayed empty even when the sidebar said '22 parse errors' — users could see there was a problem but not which files. The diagnostic collection is cleared before re-populating so stale errors don't accumulate across coverage runs."
      references_constraints: ["C-10"]
      priority: high

    - id: AC-35
      description: "The Coverage sidebar's parse-error message uses CoverageReport.specCandidatesCount and parseErrorPatterns to diagnose the shape of failure. When every discovered spec file hit the same parse error pattern (count == spec_candidates_count > 1), the message names this as `schema version drift` and points at `specter doctor`. When patterns are heterogeneous, the generic `open the Problems panel` guidance applies. When specCandidatesCount > 0 and parseErrors is empty but entries is also empty, the message names a manifest-misconfiguration case (domains excluding the specs) instead of suggesting `specter init`."
      references_constraints: ["C-10"]
      priority: high

    - id: AC-36
      description: "When the CoverageReport contains both `entries` (parsed specs) and `parseErrors` (failed files), the Coverage sidebar renders them together: a collapsible `Failed to parse` group lists each failing file as a clickable leaf (opens the file at the reported line), followed by the normal spec tree nodes for every entry. Replaces the v0.8.x behavior where parse errors hid every passing spec behind a single banner. When only parseErrors exist (no entries), the group is the only root. When only entries exist (no parseErrors), the group is omitted."
      references_constraints: ["C-10"]
      priority: critical

    - id: AC-37
      description: "The Insights panel (`specter.openInsights`) never renders 'All specs passing ✓' when CoverageReport.parseErrors is non-empty. When parse errors exist, the panel shows a `Parse failures` section listing each failing file with its error message, plus the normal `Coverage gaps` section for specs that did parse. Header text reflects the true mixed state (e.g. '17 parse error(s), 4 spec(s) parsing cleanly'). Previously the panel either crashed with `entries is not iterable` or — once the crash was fixed — defaulted to the 'all passing' headline when entries was empty, silently erasing the parse failures from the user's mental model."
      references_constraints: ["C-10"]
      priority: high

    - id: AC-38
      description: "The `specter.revealInTree` command (exposed via command palette and file-context menu) takes the active editor's file and reveals the matching node in the Coverage sidebar — expanding any collapsed ancestors and focusing the leaf. Priority: (1) spec entry whose specFile is the active file, (2) parse-error leaf for an unparsable spec, (3) test-file leaf under an AC. Requires the tree to be registered via createTreeView so .reveal() is available; registerTreeDataProvider alone is not enough. Previously the command was declared in package.json but never registered, surfacing to users as `command 'specter.revealInTree' not found`."
      references_constraints: ["C-10"]
      priority: high

    - id: AC-39
      description: "In the Insights panel, each Parse-failures card's file-path header is a clickable link that opens the corresponding file at the reported line. Implemented via webview postMessage with an `{openFile, line}` payload routed through vscode.open on the extension host. Previously the file paths were plain text, forcing users to switch back to the Coverage sidebar or Problems panel to reach the file."
      references_constraints: ["C-10"]
      priority: medium

    - id: AC-40
      description: "The on-change and on-save diagnostic hooks skip any document whose path does not end in `.spec.yaml`. The specter.yaml manifest, a test file open in the editor, or any other YAML document is not parsed against the spec schema. Previously the hooks ran `specter parse` on every YAML document, producing false 'Missing required field spec' and 'Unknown field settings' diagnostics on the manifest whose shape is `system: / settings: / domains:`. Gate is a path-suffix check (not languageId) because YAML language registration is shared across all .yaml files."
      inputs:
        doc_a: "specter.yaml (manifest — system:, settings:)"
        doc_b: "specs/auth.spec.yaml (real spec)"
      expected_output:
        doc_a_parse_invoked: false
        doc_b_parse_invoked: true
      references_constraints: ["C-10"]
      priority: high

    - id: AC-41
      description: "An automated test reads vscode-extension/package.json, extracts every `contributes.commands[].command` identifier, extracts every id passed to `vscode.commands.registerCommand(id, ...)` in vscode-extension/src/extension.ts (and any file it imports from), and asserts set equality. Missing registrations fail the build. The test runs in CI (jest or equivalent) so the gap cannot ship. Prevents the 'declared but unregistered' class demonstrated by specter.revealInTree (v0.9.0), specter.runReverse (v0.9.1), and specter.openQuickStart (v0.9.1)."
      references_constraints: ["C-22"]
      priority: critical

    - id: AC-42
      description: "`driftDecorationType` (created via vscode.window.createTextEditorDecorationType at extension activation) is pushed to ctx.subscriptions immediately after creation, so it is disposed on extension deactivation. An automated test verifies this by running activation against a stub ExtensionContext and asserting the decoration type appears in subscriptions. The same test pattern extends to every disposable covered by C-23."
      references_constraints: ["C-23"]
      priority: high

    - id: AC-43
      description: "`specter.runReverse` is registered via vscode.commands.registerCommand. The handler opens the integrated terminal with `specter reverse` prefilled, or runs the CLI directly and streams output to the Specter Output channel. Invoking the command from the command palette or from a walkthrough link (command:specter.runReverse) does not produce 'command not found'."
      inputs:
        invocation: "vscode.commands.executeCommand('specter.runReverse')"
      expected_output:
        registered: true
        raises_not_found: false
      references_constraints: ["C-22"]
      priority: critical

    - id: AC-44
      description: "`specter.openQuickStart` is either implemented as a registered command (opens a QuickStart walkthrough/webview) OR its declaration is removed from package.json contributes.commands. An orphan declaration is prohibited. Verified by the same parity test as AC-41."
      references_constraints: ["C-22"]
      priority: high

    - id: AC-45
      description: "When the extension activates in a workspace with no .spec.yaml and no specter.yaml, the CLI binary is still resolved (auto-download if specter.autoDownload is true, modal error if false and no binary found). Commands like specter.runReverse, specter.init (via terminal), and specter.showOutput are usable in a fresh workspace before any spec exists. The v0.8.x behavior where the extension silently sat dormant until specs appeared is prohibited."
      inputs:
        workspace_state: "no specter.yaml, no .spec.yaml, specter.autoDownload=true, binary not present"
      expected_output:
        binary_download_attempted: true
        runReverse_command_usable: true
      references_constraints: ["C-25"]
      priority: high

    - id: AC-46
      description: "The onboarding walkthrough (`specter.gettingStarted`) fires when `shouldShowWalkthrough({ specFiles: [], hasSpecterManifest: false })` returns true. The check MUST execute; it MUST NOT be placed after an early-return gated on a condition mutually exclusive with the walkthrough's own (i.e., 'has specs or manifest')."
      inputs:
        workspace_state: "no specs, no manifest, extension just installed"
      expected_output:
        walkthrough_opened: true
      references_constraints: ["C-25"]
      priority: high

    - id: AC-47
      description: "Auto-downloaded CLI installation refuses to write the binary to disk unless SHA256 verification succeeds. Test cases: (1) checksums.txt is 404 — installation fails with modal error, no partial binary on disk; (2) checksums.txt is valid but does not contain an entry for the downloaded archive name — installation fails; (3) checksums.txt contains a mismatched hash — installation fails. Only case where installation succeeds is when the archive's computed SHA256 matches the expected hash. No silent fallback under any condition."
      inputs:
        case_a: "checksums.txt 404"
        case_b: "checksums.txt missing archive entry"
        case_c: "checksums.txt has wrong hash"
        case_d: "checksums.txt has correct hash"
      expected_output:
        case_a_installs: false
        case_b_installs: false
        case_c_installs: false
        case_d_installs: true
      references_constraints: ["C-24"]
      priority: critical

    - id: AC-48
      description: "The on-type debounce handler in onDidChangeTextDocument catches parse errors and writes a `[timestamp] parse failed for <file>: <message>` line to the Specter Output channel. The user editing a .spec.yaml and introducing invalid YAML can open the Output channel and see the failure, rather than observing nothing."
      references_constraints: ["C-26"]
      priority: medium

    - id: AC-49
      description: "Drift-scan failures in both hooks (onDidChangeActiveTextEditor and onDidSaveTextDocument) write a `[timestamp] drift scan failed for <file>: <message>` line to the Specter Output channel. Previously both sites had `.catch(() => {})`, silently discarding failures. The Output channel is the authoritative place to see them."
      references_constraints: ["C-26"]
      priority: medium

