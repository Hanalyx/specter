  changelog:
    - version: "1.3.0"
      date: "2026-04-19"
      author: "specter-team"
      type: minor
      description: >
        v0.9.1 post-ship audit fixes (see research/SPECTER_AUDIT_2026-04-19.md).
        Add C-22/AC-41 (package.json ↔ extension.ts command parity enforced by
        CI test — eliminates the declared-but-unregistered class that shipped
        three times in v0.9.0/v0.9.1). Add C-23/AC-42 (disposables pushed to
        ctx.subscriptions; specifically fixes driftDecorationType leak). Add
        C-22/AC-43 (register specter.runReverse) and C-22/AC-44 (resolve the
        specter.openQuickStart orphan declaration). Add C-24/AC-47 (mandatory
        checksum verification — no silent fallback when checksums.txt is
        unreachable). Add C-25/AC-45 (binary resolution runs even in empty
        workspaces) and C-25/AC-46 (walkthrough reachable when its condition
        is true). Add C-26/AC-48 (on-type parse errors to Output channel) and
        C-26/AC-49 (drift-scan errors to Output channel).
    - version: "1.2.0"
      date: "2026-04-19"
      author: "specter-team"
      type: minor
      description: >
        v0.9.0 coherent failure-handling. Rewrite AC-29 against the new
        spec-coverage 1.5.0 parse_errors contract. Add AC-30 (no-specs-yet
        distinct from parse-failure), AC-31 (runSync emits honest completion
        message), AC-32 (hover populates coveredByFiles from the real
        report instead of passing []), AC-33 (Coverage sidebar is clickable
        — spec nodes open the .spec.yaml, test-file leaves open the test
        file, with relative paths resolved against the workspace root),
        AC-34 (parse errors push to VS Code Problems panel as diagnostics,
        one per broken file, clickable), AC-35 (sidebar diagnostic message
        uses spec_candidates_count + parse_error_patterns to name schema
        drift explicitly when every spec hit the same failure), AC-36
        (sidebar renders passing specs AND a Failed-to-parse group in the
        same tree so users can act on both without one hiding the other),
        AC-37 (Insights panel no longer claims `All specs passing` when
        parse failures exist — renders a Parse-failures section alongside
        coverage cards, with an honest mixed-state header), AC-38
        (specter.revealInTree command wired end-to-end: active editor →
        matching tree node, previously declared in package.json but never
        registered), AC-39 (Insights parse-failure cards have clickable
        file-path headers that open the file at the reported line),
        AC-40 (on-change/on-save parse hooks gated to .spec.yaml so the
        manifest specter.yaml stops receiving spurious `Missing required
        field 'spec'` diagnostics).
        Addresses quality-audit BLOCKER B1 and HIGHs H1/H3.
    - version: "1.1.0"
      date: "2026-04-18"
      author: "specter-team"
      type: minor
      description: >
        Add C-21/AC-28/AC-29: Coverage sidebar renders a state message node
        when no coverage data is available (missing manifest / no specs / all
        specs failed to parse). Prevents the silent-empty-panel dead-end.
        Also add AC-23..AC-27 retroactively covering v0.6.5–v0.6.9 extension
        work that was previously not pinned in the spec.
    - version: "1.0.0"
      date: "2026-04-15"
      author: "specter-team"
      type: initial
      description: >
        Initial spec for the Specter VS Code extension. Architecture: TypeScript
        thin wrapper over specter CLI JSON API. 22 ACs covering binary discovery,
        diagnostics, coverage decorations, annotation assistance, intent drift
        detection, AI context bridge, insight panel, and frictionless onboarding.
