spec:
  id: spec-watch
  version: "1.1.0"
  status: draft
  tier: 2

  context:
    system: Specter toolchain
    feature: File-system watcher for interactive sync
    description: >
      Makes the draft→check→fix authoring loop interactive by re-running the full
      sync pipeline whenever a .spec.yaml or test file changes. Same semantics as
      `tsc --watch` for TypeScript. Uses fsnotify for reliable event-based watching
      (inotify on Linux, FSEvents on macOS). Terminates cleanly on Ctrl+C / SIGTERM.
    related_specs:
      - "spec-sync"

  objective:
    summary: >
      Watch .spec.yaml and test files for filesystem events, re-run the full sync
      pipeline on any detected change (with 150ms debounce), and display a compact
      timestamped summary per run. Exit cleanly on interrupt.
    scope:
      includes:
        - "Event-based watching via fsnotify (inotify/FSEvents/kqueue)"
        - "Re-run full sync pipeline (parse + resolve + check + coverage) on detected change"
        - "Timestamped compact summary per run (PASS/FAIL + AC count)"
        - "150ms debounce to coalesce rapid successive writes"
        - "Graceful exit on Ctrl+C / SIGTERM with exit code 0"
        - "Initial run on startup before first event"
      excludes:
        - "Writing or modifying spec files"
        - "Network requests"
        - "Interactive TUI"
        - "--interval polling flag (replaced by fsnotify)"

  constraints:
    - id: C-01
      description: "MUST re-run the sync pipeline whenever a .spec.yaml or test file is created, modified, or renamed"
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST use fsnotify for event-based change detection; polling is not acceptable"
      type: technical
      enforcement: error

    - id: C-03
      description: "MUST print a timestamped compact summary after every run (timestamp + PASS/FAIL + spec count + AC coverage count)"
      type: technical
      enforcement: error

    - id: C-04
      description: "MUST exit 0 on Ctrl+C (SIGINT) or SIGTERM — no error exit on user interrupt"
      type: technical
      enforcement: error

    - id: C-05
      description: "MUST debounce rapid successive events with a 150ms window to avoid redundant pipeline runs"
      type: technical
      enforcement: error

    - id: C-06
      description: "MUST run the sync pipeline once immediately on startup before the first event"
      type: technical
      enforcement: error

    - id: C-07
      description: "MUST continue watching even if a run produces FAIL — watch mode is for the authoring loop, not CI enforcement"
      type: technical
      enforcement: error

    - id: C-08
      description: "MUST print a startup message listing the watched directory and that Ctrl+C stops the watcher"
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: "On startup, watch prints the watched directory and runs sync immediately"
      expected_output:
        startup_message: true
        initial_run_before_first_event: true
      references_constraints: ["C-06", "C-08"]
      priority: critical

    - id: AC-02
      description: "Modifying a .spec.yaml file triggers a re-run within 500ms"
      references_constraints: ["C-01", "C-05"]
      priority: critical

    - id: AC-03
      description: "Modifying a test file triggers a re-run within 500ms"
      references_constraints: ["C-01", "C-05"]
      priority: high

    - id: AC-04
      description: "Each run prints a line with timestamp, PASS or FAIL, and summary counts"
      expected_output:
        format_example: "[14:32:05] PASS  8 specs  47/52 ACs covered"
      references_constraints: ["C-03"]
      priority: high

    - id: AC-05
      description: "Ctrl+C exits with code 0, not 1"
      expected_output:
        exit_code: 0
      references_constraints: ["C-04"]
      priority: critical

    - id: AC-06
      description: "Rapid successive writes within 150ms produce exactly one pipeline run, not multiple"
      references_constraints: ["C-05"]
      priority: high

    - id: AC-07
      description: "A FAIL run does not stop the watch loop — subsequent file changes still trigger re-runs"
      references_constraints: ["C-07"]
      priority: critical

  depends_on:
    - spec_id: spec-sync
      version_range: "^1.0.0"
      relationship: requires

  changelog:
    - version: "1.1.0"
      date: "2026-04-15"
      author: "specter-team"
      type: minor
      description: "Replace polling with fsnotify event-based watching; update C-02, C-05, AC-02, AC-03, AC-06"
    - version: "1.0.0"
      date: "2026-04-14"
      author: "specter-team"
      type: initial
      description: "Initial spec for the specter watch filesystem watcher"
