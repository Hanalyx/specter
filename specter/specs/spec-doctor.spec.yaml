spec:
  id: spec-doctor
  version: "1.7.0"
  status: draft
  tier: 2

  context:
    system: Specter toolchain
    feature: Project health checker
    description: >
      A pre-flight diagnostic command that checks project readiness before
      running the full sync pipeline. Reports PASS/WARN/FAIL for each check
      so developers understand exactly what needs attention. Designed for
      first-run experience and ongoing project hygiene.
    related_specs:
      - "spec-parse"
      - "spec-sync"
      - "spec-coverage"
      - "spec-manifest"

  objective:
    summary: >
      Run a series of project health checks and report their status as
      PASS, WARN, or FAIL. Exit non-zero if any check fails. Exit zero
      if all checks pass or warn.
    scope:
      includes:
        - "Check for specter.yaml manifest presence"
        - "Check for .spec.yaml files in the project"
        - "Check that all discovered specs parse cleanly"
        - "Check for @spec/@ac annotations in test files"
        - "Check that coverage meets tier thresholds"
        - "Per-check PASS/WARN/FAIL status with actionable message"
        - "Exit code 0 = all PASS or WARN; exit code 1 = any FAIL"
      excludes:
        - "Writing or modifying any files"
        - "Running sync pipeline end-to-end"
        - "Network requests or external service checks"

  constraints:
    - id: C-01
      description: "MUST check for specter.yaml manifest presence and report WARN (not FAIL) if absent — manifest is optional"
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST check for .spec.yaml files and report FAIL if none are found"
      type: technical
      enforcement: error

    - id: C-03
      description: "MUST check that all discovered specs parse cleanly and report FAIL if any have errors"
      type: technical
      enforcement: error

    - id: C-04
      description: "MUST check for @spec/@ac annotations in test files and report WARN (not FAIL) if none are found"
      type: technical
      enforcement: error

    - id: C-05
      description: "MUST check coverage against tier thresholds and report FAIL if any spec is below threshold"
      type: technical
      enforcement: error

    - id: C-06
      description: "MUST exit 0 if all checks are PASS or WARN; MUST exit 1 if any check is FAIL"
      type: technical
      enforcement: error

    - id: C-07
      description: "MUST NOT write or modify any files — read-only diagnostic tool"
      type: technical
      enforcement: error

    - id: C-08
      description: "MUST report all checks regardless of failures — no short-circuit on first FAIL"
      type: technical
      enforcement: error

    - id: C-09
      description: "When the parse check fails, doctor MUST print a pattern analysis section that groups parse errors by (type, path). If a single pattern covers every discovered spec, doctor MUST name this as the signature of schema-version drift and suggest the operator check the Specter schema changelog. Rationale: a flat list of 20 identical parse errors is noise; a single `every spec missing required field X` line is a diagnosis."
      type: business
      enforcement: error

    - id: C-10
      description: "When run without a `specter.yaml`, `specter doctor` MUST discover `.spec.yaml` files via a recursive walk from the current working directory, applying the default exclusions (`node_modules`, `dist`, `.git`, `vendor`, `__pycache__`, `.next`, `testdata`, `tests/fixtures`). When a `specter.yaml` IS present, doctor MUST honor `settings.specs_dir` (default `specs`) as before. Rationale: AC-02 reports the manifest as `WARN (optional)`; if discovery then fails for specs outside `./specs/`, the `optional` framing is a lie. The two checks must agree about whether running without a manifest is supported."
      type: technical
      enforcement: error

    - id: C-11
      description: "`specter doctor --fix` MUST apply known-safe schema-drift rewrites to affected spec files and write the results in place. The rewrite set is a fixed table in `internal/migrate` (not user-configurable in v0.12). Initial table: strip `trust_level` from specs whose parse error signature is `additionalProperties` at path `spec` with message naming `'trust_level'` (removed in v0.6.5). The table is extensible — future rewrites (field renames, root-level-block wrap) land as additions without API change. Rewrites apply ONLY to specs whose parse errors match a known pattern; specs with unmatched errors are left untouched. Writes are byte-preserving outside the rewrite (no whole-file reformatting)."
      type: business
      enforcement: error

    - id: C-12
      description: "`specter doctor --fix --dry-run` MUST print the list of (file → rewrite) actions that `--fix` would apply WITHOUT modifying any files on disk. Exit 0 regardless of whether rewrites were found. Rationale: matches the `init --refresh --dry-run` precedent (spec-manifest C-20); lets operators review before committing."
      type: technical
      enforcement: error

    - id: C-13
      description: "After `--fix` or `--fix --dry-run`, doctor MUST print a summary of the form `doctor --fix: N file(s) rewritten` (or `N file(s) would be rewritten` under dry-run), listing each affected file with the rewrite name applied. When N=0, doctor MUST print `doctor --fix: no changes` and exit 0. Rationale: the operator needs to know what happened (or what would happen) without re-reading the files."
      type: business
      enforcement: error

    - id: C-14
      description: "`specter doctor --fix` MUST canonicalize `specter.yaml` when present: if the file exists on disk but lacks a `schema_version:` line, `--fix` prepends `schema_version: 1\\n` to the file (preserving the original content byte-for-byte after that line) and counts the manifest as one rewritten file in the C-13 summary with rewrite name `add-schema-version`. If `specter.yaml` already declares `schema_version:`, the manifest is byte-unchanged. If `specter.yaml` does not exist, manifest canonicalization is a silent no-op (`specter init` is the right command for that path). Under `--dry-run`, no write occurs and the summary uses the `would be rewritten` form. Rationale: a pre-v0.12 project upgrading has a manifest without `schema_version`; `doctor --fix` is the natural upgrade path. Pairs with the `schema_version` field added to the Manifest struct in spec-manifest 1.9.0."
      type: business
      enforcement: error

    - id: C-15
      description: "When a spec rewrite predicate matches but the targeted value is structurally unsafe for line-based deletion, `--fix` MUST emit an `unhandled` diagnostic naming the file and the reason instead of producing a partial rewrite. The file MUST remain byte-unchanged. The underlying invariant for line-based deletion is `the value occupies exactly one source line` — refusal MUST trigger when ANY of the following hold: (a) `Node.Kind` is not `ScalarNode` (sequence, mapping, alias); (b) `Node.Style` is `LiteralStyle` or `FoldedStyle` (block scalars `|`/`>`); (c) the value's source span exceeds one line — folded plain scalars, multi-line quoted scalars, or any source-shape where a non-blank/non-comment line at greater indentation than the key follows the value's first line. Detection MUST iterate every YAML document in the file (via `yaml.Decoder` for multi-document files) — the rewrite predicate fires per parse-error per file, but the safety check MUST cover every document so that an unsafe shape in document N>0 still refuses the whole-file rewrite. The summary MUST split into two blocks: `doctor --fix: N file(s) rewritten` (successful) and `doctor --fix: N file(s) need manual edit` (refused), with each manual-edit entry on its own line in the form `  skip <file> — <reason>`. Rationale: the line-based regex deletion in C-11 is byte-preserving (its strength) but unsafe on values that span multiple lines (its weakness); refusal is safer than corruption. Earlier wording (v1.5.0) enumerated specific unsafe shapes; this version (v1.6.0) names the underlying invariant so future YAML idioms that span lines without a block-scalar indicator (folded plain, quoted multi-line) are correctly refused."
      type: business
      enforcement: error

    - id: C-16
      description: "`specter doctor --fix` is a BETA feature in v0.12. Before applying any rewrite or canonicalization, `--fix` MUST print a clearly-marked `[BETA]` warning to stderr describing (a) the known string-literal corruption gap (deferred to BACKLOG cycle 6), (b) the recommendation to commit spec files BEFORE running so changes can be diffed and reverted, and (c) `--dry-run` as a safe preview path. After the warning, `--fix` MUST prompt the operator on stdin with `Continue? (y/N): ` and MUST require an affirmative response (`y` or `yes`, case-insensitive) to proceed. Any other input — empty/Enter, `n`/`no`, or any non-affirmative string — MUST exit 0 with a `Aborted. No files modified.` line and no on-disk changes. The `--yes` (or `-y`) CLI flag MUST bypass both the warning and the prompt for non-interactive use (CI, scripted migrations). When stdin is not a terminal AND `--yes` is not set, `--fix` MUST refuse with an explicit error directing the operator to either run interactively or pass `--yes`. `--dry-run` MUST be exempt from the prompt — preview mode is read-only. Rationale: the BACKLOG cycle 6 known-limitation can corrupt spec documentation that mentions deprecated field names in prose; until that's closed, gating the destructive path behind explicit acknowledgment is the right safety posture."
      type: business
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: "Project with specter.yaml reports manifest check as PASS"
      inputs:
        project: "directory containing specter.yaml"
      expected_output:
        manifest_status: "PASS"
      references_constraints: ["C-01"]
      priority: high

    - id: AC-02
      description: "Project without specter.yaml reports manifest check as WARN, not FAIL"
      inputs:
        project: "directory without specter.yaml"
      expected_output:
        manifest_status: "WARN"
        exit_code: 0
      references_constraints: ["C-01", "C-06"]
      priority: critical

    - id: AC-03
      description: "Project with zero .spec.yaml files reports spec-files check as FAIL"
      inputs:
        project: "empty directory"
      expected_output:
        spec_files_status: "FAIL"
        exit_code: 1
      references_constraints: ["C-02", "C-06"]
      priority: critical

    - id: AC-04
      description: "Project with a spec that has parse errors reports parse check as FAIL"
      inputs:
        project: "directory with an invalid .spec.yaml"
      expected_output:
        parse_status: "FAIL"
        exit_code: 1
      references_constraints: ["C-03", "C-06"]
      priority: critical

    - id: AC-05
      description: "Project with no @spec/@ac annotations reports annotations check as WARN, not FAIL"
      inputs:
        project: "directory with specs but no annotated test files"
      expected_output:
        annotations_status: "WARN"
        exit_code: 0
      references_constraints: ["C-04", "C-06"]
      priority: high

    - id: AC-06
      description: "Project with a spec below its tier coverage threshold reports coverage check as FAIL"
      inputs:
        project: "Tier 1 spec with 0% coverage"
      expected_output:
        coverage_status: "FAIL"
        exit_code: 1
      references_constraints: ["C-05", "C-06"]
      priority: critical

    - id: AC-07
      description: "All checks are always reported even when an earlier check fails"
      inputs:
        project: "project with parse errors and zero coverage"
      expected_output:
        all_five_checks_reported: true
      references_constraints: ["C-08"]
      priority: high

    - id: AC-08
      description: "doctor produces no file writes — project directory is unchanged after running"
      references_constraints: ["C-07"]
      priority: high

    - id: AC-09
      description: "Workspace with 3 .spec.yaml files all missing the required field `objective` — doctor prints a pattern analysis block naming the single widespread (type=required, path=spec.objective) signature and flags it as schema version drift. When the errors are heterogeneous (different fields across files), doctor lists the top patterns with counts instead of naming drift."
      inputs:
        project_a: "3 spec files, all missing `objective`"
        project_b: "3 spec files, different errors (missing objective, bad enum, bad format)"
      expected_output:
        project_a_output_includes: "schema version drift"
        project_b_output_includes: "occurrence(s) across"
      references_constraints: ["C-09"]
      priority: high

    - id: AC-10
      description: "Project without `specter.yaml` containing a `.spec.yaml` at cwd root (e.g. `./bar.spec.yaml`) reports spec-files as PASS, not FAIL. Same for a non-default subdirectory (e.g. `./mySpecs/bar.spec.yaml`). The previous behavior (only finding specs under `./specs/`) was inconsistent with manifest-as-optional framing."
      inputs:
        project_root_spec: "directory with bar.spec.yaml at cwd root, no specter.yaml"
        project_custom_dir: "directory with mySpecs/bar.spec.yaml, no specter.yaml"
      expected_output:
        spec_files_status: "PASS"
        exit_code_when_only_doctor_check_fails_is_unrelated: "either 0 or 1 depending on coverage; spec-files itself is PASS"
      references_constraints: ["C-10"]
      priority: critical

    - id: AC-11
      description: "Project WITH `specter.yaml` honors `settings.specs_dir` for discovery — recursive-from-cwd does not override it. Manifest with `specs_dir: customSpecs` finds files under `customSpecs/` only; specs at cwd root or in other subdirectories are NOT discovered. Guards against the v0.12 fix accidentally breaking explicit configurations."
      inputs:
        project: "directory with specter.yaml setting specs_dir: customSpecs, plus specs at customSpecs/a.spec.yaml AND b.spec.yaml at cwd root"
      expected_output:
        discovered_count: 1
        discovered_includes: "customSpecs/a.spec.yaml"
        discovered_excludes: "b.spec.yaml"
      references_constraints: ["C-10"]
      priority: critical

    - id: AC-12
      description: "`specter doctor --fix` in a workspace with one .spec.yaml file that has `trust_level: high` at the `spec.` level rewrites the file in place to remove that line. After rewrite, `specter parse` on the file succeeds. All other fields and surrounding lines are byte-preserved."
      inputs:
        file_before: "spec with trust_level: high under spec:"
        command: "specter doctor --fix"
      expected_output:
        trust_level_removed: true
        parse_after_rewrite_succeeds: true
      references_constraints: ["C-11"]
      priority: critical

    - id: AC-13
      description: "`specter doctor --fix --dry-run` on the same workspace prints what `--fix` would do (file path + rewrite name) but leaves the file byte-identical on disk. Output contains `would rewrite` and names the file and the rewrite name."
      inputs:
        command: "specter doctor --fix --dry-run"
      expected_output:
        stdout_contains: "would rewrite"
        file_unchanged_on_disk: true
        exit_code: 0
      references_constraints: ["C-12"]
      priority: high

    - id: AC-14
      description: "`specter doctor` (no `--fix`) in a workspace with `trust_level` drift must NOT write any file changes. Drift is reported in the pattern-analysis block (C-09); the filesystem is byte-unchanged after the command exits. Regression guard for C-07 (read-only by default)."
      inputs:
        command: "specter doctor"
      expected_output:
        file_unchanged_on_disk: true
      references_constraints: ["C-07"]
      priority: critical

    - id: AC-15
      description: "`specter doctor --fix` in a workspace with no known-drift signature (every spec parses cleanly, OR parse errors don't match any rewrite pattern) prints `doctor --fix: no changes` and exits 0 without writing any files."
      inputs:
        case_a: "workspace with all clean specs"
        case_b: "workspace where parse errors don't match any rewrite"
      expected_output:
        stdout_contains: "no changes"
        exit_code: 0
      references_constraints: ["C-13"]
      priority: high

    - id: AC-16
      description: "`specter doctor --fix` in a workspace whose `specter.yaml` exists but lacks `schema_version` adds `schema_version: 1` at the top of the file. After the command, ParseManifest on the file reports SchemaVersion=1. The original manifest content (system, domains, settings, comments) is byte-preserved after the new schema_version line. The summary names the manifest with rewrite `add-schema-version`."
      inputs:
        manifest_before: "specter.yaml with system/domains/settings but no schema_version line"
        command: "specter doctor --fix"
      expected_output:
        first_nonempty_line: "schema_version: 1"
        parsed_schema_version: 1
        summary_contains: "add-schema-version"
      references_constraints: ["C-14"]
      priority: critical

    - id: AC-17
      description: "`specter doctor --fix` when `specter.yaml` already declares `schema_version:` leaves the manifest byte-unchanged. The summary does NOT name the manifest as rewritten (no spurious entry). If only the manifest already had schema_version and no spec rewrites apply, the summary is `doctor --fix: no changes`."
      inputs:
        manifest_before: "specter.yaml with schema_version: 1 already at top"
        command: "specter doctor --fix"
      expected_output:
        manifest_byte_unchanged: true
        summary_does_not_mention_manifest: true
      references_constraints: ["C-14"]
      priority: high

    - id: AC-18
      description: "`specter doctor --fix` in a workspace with NO `specter.yaml` performs no manifest canonicalization (silent no-op). The command does not create the file, does not error, and does not include any manifest entry in the summary. The summary reflects only spec-file rewrites (or `no changes` if none apply)."
      inputs:
        workspace: "directory with .spec.yaml files but no specter.yaml"
        command: "specter doctor --fix"
      expected_output:
        manifest_not_created: true
        no_manifest_entry_in_summary: true
      references_constraints: ["C-14"]
      priority: high

    - id: AC-19
      description: "Spec file containing `trust_level: |` (block scalar with literal-style indicator) followed by indented continuation lines: `--fix` MUST refuse the rewrite. The file is byte-unchanged on disk. The summary splits into two blocks: rewritten (does NOT include this file) and needs-manual-edit (lists this file with reason `trust_level uses a block scalar`). Same treatment for the folded-style indicator (`>`)."
      inputs:
        file_before: "spec under spec: with `trust_level: |` then indented continuation lines `    high` and `    confidence`"
        command: "specter doctor --fix"
      expected_output:
        file_byte_unchanged: true
        summary_contains_section: "need manual edit"
        manual_edit_reason_contains: "block scalar"
        rewritten_count_for_file: 0
      references_constraints: ["C-15"]
      priority: critical

    - id: AC-20
      description: "Spec file containing `trust_level:` followed by a sequence value (next-line `- entries`) or a mapping value (next-line key:value pairs): `--fix` MUST refuse the rewrite. The file is byte-unchanged on disk. The needs-manual-edit summary entry names the file with reason `trust_level value is not a scalar`. Plain scalar values (`trust_level: high`, `trust_level: \"high\"`, `trust_level: 0.5`) MUST continue to rewrite successfully — this AC narrows refusal to non-scalar shapes only."
      inputs:
        case_sequence: "trust_level: with next-line '- high' / '- medium' entries"
        case_mapping: "trust_level: with next-line nested key:value pairs"
        case_plain_scalar: "trust_level: high (regression — must still rewrite)"
      expected_output:
        sequence_refused: true
        mapping_refused: true
        plain_scalar_rewritten: true
        manual_edit_reason_contains: "not a scalar"
      references_constraints: ["C-15"]
      priority: critical

    - id: AC-21
      description: "Plain scalar value with folded continuation: `trust_level: high\\n    confidence` (no `|`/`>` indicator; YAML's plain-scalar folding rule lets indented continuation lines extend a plain scalar across multiple source lines). `--fix` MUST refuse the rewrite. yaml.v3 reports this as `Kind=ScalarNode, Style=PlainStyle` (passes the AC-19/20 kind/style checks), so refusal MUST come from the line-span branch of C-15. Reason MUST mention `spans multiple lines`. File is byte-unchanged on disk. Closes the gap surfaced in the v0.12 review where the AC-19/20 fix only refused explicit block scalars and let folded plain scalars through, producing the same orphaned-continuation corruption."
      inputs:
        file_before: "spec under spec: with `trust_level: high` then indented continuation `    confidence` on the next line"
        command: "specter doctor --fix"
      expected_output:
        file_byte_unchanged: true
        rewritten_count_for_file: 0
        manual_edit_reason_contains: "spans multiple lines"
      references_constraints: ["C-15"]
      priority: critical

    - id: AC-22
      description: "Quoted scalar value spanning multiple source lines: `trust_level: \"line1\\n    line2\"` or single-quoted equivalent. yaml.v3 reports `Kind=ScalarNode, Style=DoubleQuotedStyle` (or `SingleQuotedStyle`) — passes the kind/style checks. Refusal MUST come from the line-span branch. Reason MUST mention `spans multiple lines`. File is byte-unchanged. Single-line quoted values (`trust_level: \"high\"`) MUST continue to rewrite — this AC adds source-span as the discriminator."
      inputs:
        case_double_quoted: "trust_level: \"line1\\n    line2\""
        case_single_quoted: "trust_level: 'line1\\n    line2'"
        case_single_line_quoted: "trust_level: \"high\" (regression — must still rewrite)"
      expected_output:
        double_quoted_multiline_refused: true
        single_quoted_multiline_refused: true
        single_line_quoted_rewritten: true
      references_constraints: ["C-15"]
      priority: critical

    - id: AC-23
      description: "Multi-document YAML file (separated by `---`) where document 0 has a safe `trust_level: high` plain scalar AND document 1 has an unsafe shape (block scalar, folded plain, or quoted multi-line). `--fix` MUST refuse the whole file — the rewrite is per-file, not per-document, and partially rewriting the file would leave doc 1 corrupted. Detection MUST iterate documents via `yaml.Decoder` and run the safety check on each. Reason MUST name the unsafe shape in the offending document. The earlier v1.5.0 implementation only inspected `doc.Content[0]` and missed unsafe shapes in doc 1+."
      inputs:
        file: "two YAML documents: doc 0 trust_level: high (safe); doc 1 trust_level: | with continuation (unsafe)"
        command: "specter doctor --fix"
      expected_output:
        file_byte_unchanged: true
        rewritten_count_for_file: 0
        manual_edit_reason_contains_block_scalar_or_spans: true
      references_constraints: ["C-15"]
      priority: high

    - id: AC-24
      description: "Interactive `specter doctor --fix` (TTY stdin, `--yes` not set, not `--dry-run`) on a workspace with rewrite-eligible drift. `--fix` MUST print a `[BETA]` warning block to stderr naming the cycle 6 string-literal corruption gap, the commit-first recommendation, and the `--dry-run` alternative. After the warning, `--fix` MUST emit `Continue? (y/N): ` to stderr and read one line from stdin. Operator types `y` (or `Y`/`yes`/`YES`) → `--fix` proceeds with the rewrite as in C-11/C-13, file is rewritten, summary prints. Workspace ends in the same state as if `--fix` had been called without the gate."
      inputs:
        scenario: "TTY stdin; trust_level: high under spec; user types 'y' at prompt"
      expected_output:
        warning_contains: "BETA"
        warning_contains_cycle_6: true
        prompt_contains: "Continue? (y/N)"
        on_yes_proceeds: true
        file_rewritten_after_yes: true
      references_constraints: ["C-16"]
      priority: critical

    - id: AC-25
      description: "Interactive `specter doctor --fix` where the operator declines the prompt. Any of: empty input (Enter), `n`, `N`, `no`, `NO`, or any string not in `{y, yes, Y, YES}` MUST cause `--fix` to print `Aborted. No files modified.` to stdout and exit 0. NO files MUST be modified — both spec rewrites AND manifest canonicalization MUST be skipped. The diagnostic checks above the prompt still ran and printed; only the repair pass is gated by the prompt."
      inputs:
        scenarios:
          - "TTY stdin; user presses Enter (empty)"
          - "TTY stdin; user types 'n'"
          - "TTY stdin; user types 'no'"
          - "TTY stdin; user types 'maybe later'"
      expected_output:
        all_scenarios_exit_code: 0
        all_scenarios_print_aborted: true
        all_scenarios_files_byte_unchanged: true
      references_constraints: ["C-16"]
      priority: critical

    - id: AC-26
      description: "`specter doctor --fix --yes` MUST bypass both the BETA warning and the prompt entirely. The `--yes` flag is the explicit acknowledgment for non-interactive use (CI, scripted migrations). After the diagnostic checks print, `--fix` proceeds directly to the rewrite without any warning or stdin read. `-y` is an accepted short alias."
      inputs:
        scenarios:
          - "any stdin (TTY or not); --yes flag"
          - "any stdin; -y short flag"
      expected_output:
        no_beta_warning_printed: true
        no_prompt_printed: true
        rewrite_proceeds: true
      references_constraints: ["C-16"]
      priority: high

    - id: AC-27
      description: "`specter doctor --fix` invoked with non-TTY stdin (e.g., piped from another command, redirected from /dev/null, or in a CI environment without a controlling terminal) AND without `--yes` MUST refuse with an explicit error message naming the two acceptable paths: run interactively, or pass `--yes`. Exit code MUST be non-zero. NO files MUST be modified. Rationale: silently hanging on a stdin read in CI is a worse failure than refusing — and silently auto-proceeding without the operator acknowledging the BETA warning defeats the gate's purpose."
      inputs:
        scenario: "stdin piped from /dev/null or another process; --yes not set; --dry-run not set"
        command: "specter doctor --fix < /dev/null"
      expected_output:
        exit_code_nonzero: true
        error_contains: "--yes"
        error_contains_interactive: true
        files_byte_unchanged: true
      references_constraints: ["C-16"]
      priority: high

    - id: AC-28
      description: "`specter doctor --fix --dry-run` MUST skip the BETA warning AND the prompt — preview mode is read-only and safe. The dry-run summary still prints (`would be rewritten` / `would be rewritten under manual edit`). Exit code 0 regardless of whether rewrites or refusals were found. Operators use `--dry-run` as the side-effect-free preview before deciding whether to run `--fix` for real."
      inputs:
        scenario: "any stdin; --fix --dry-run on workspace with trust_level drift"
      expected_output:
        no_beta_warning_printed: true
        no_prompt_printed: true
        dry_run_summary_prints: true
        files_byte_unchanged: true
      references_constraints: ["C-16"]
      priority: high

  depends_on:
    - spec_id: spec-parse
      version_range: "^1.0.0"
      relationship: requires
    - spec_id: spec-coverage
      version_range: "^1.0.0"
      relationship: requires
    - spec_id: spec-manifest
      version_range: "^1.0.0"
      relationship: requires

  changelog:
    - version: "1.7.0"
      date: "2026-04-29"
      author: "specter-team"
      type: minor
      description: "v0.12 BETA gate — `specter doctor --fix` is gated behind a `[BETA]` warning + interactive y/N confirmation until BACKLOG cycle 6 (line-targeted deletion) closes the known string-literal corruption gap. Add C-16 + AC-24/25/26/27/28: warning to stderr, prompt to stdin, affirmative-only proceed, `Aborted` on decline. `--yes` / `-y` flag bypasses for CI; non-TTY stdin without `--yes` errors with guidance. `--dry-run` exempt — preview is read-only."
    - version: "1.6.0"
      date: "2026-04-28"
      author: "specter-team"
      type: minor
      description: "v0.12 review-of-the-fix — tighten C-15's refusal predicate. The v1.5.0 impl over-fit to specific unsafe shapes (block scalar, non-scalar) and missed three corruption-causing shapes the agent review surfaced: folded plain scalars with indented continuation (AC-21), multi-line quoted scalars (AC-22), and unsafe shapes in non-first documents of multi-document YAML files (AC-23). All three pass yaml.v3's Kind/Style check yet still produce the same orphaned-continuation corruption the v1.5.0 fix was meant to close. C-15 reworded to name the underlying invariant (`value occupies exactly one source line`); detection MUST also walk source lines around `Node.Line` to verify span, and MUST iterate documents via `yaml.Decoder` rather than inspect only `doc.Content[0]`. Adds AC-21/22/23."
    - version: "1.5.0"
      date: "2026-04-28"
      author: "specter-team"
      type: minor
      description: "v0.12 review fix — yaml-aware refusal of structurally unsafe rewrites. Add C-15 + AC-19/20: when a rewrite predicate matches but the YAML shape (block scalar, sequence, mapping value, anchor/alias) is unsafe for line-based deletion, `--fix` refuses with an `unhandled` diagnostic instead of producing a corrupted file. Detection uses yaml.v3 Node.Kind/Style inspection. Summary splits into rewritten + needs-manual-edit blocks. Closes the file-corruption bug surfaced in the v0.12 review against `trust_level: |` block scalars."
    - version: "1.4.0"
      date: "2026-04-27"
      author: "specter-team"
      type: minor
      description: "v0.12 — manifest canonicalization in --fix. Add C-14/AC-16/17/18: `specter doctor --fix` prepends `schema_version: 1` to a pre-v0.12 manifest that lacks the field. Already-canonical manifests are byte-unchanged; missing manifests are a silent no-op. Pairs with spec-manifest 1.9.0's schema_version field. Activates the schema-stability policy."
    - version: "1.3.0"
      date: "2026-04-27"
      author: "specter-team"
      type: minor
      description: "v0.12 — `specter doctor --fix` rewrite table. Add C-11/AC-12 for known-safe rewrites (initial table: strip `trust_level`, removed in v0.6.5). Add C-12/AC-13 for `--fix --dry-run` (preview without writing). Add C-13/AC-14/AC-15 for the rewrite summary (`N file(s) rewritten` or `no changes`) and the regression guard that `doctor` without `--fix` stays read-only. Rewrites live in a new `internal/migrate` package as a table-driven design — adding future rewrites (field renames, schema-version migrations) requires only a table entry, not a code-path change."
    - version: "1.2.0"
      date: "2026-04-27"
      author: "specter-team"
      type: minor
      description: "Add C-10/AC-10/AC-11 for GH #93: align doctor's no-manifest discovery with the manifest-as-optional framing. When no `specter.yaml` is present, discovery walks recursively from cwd (with default exclusions). When a manifest IS present, doctor honors `settings.specs_dir` as before — the manifest-present path is unchanged."
    - version: "1.1.0"
      date: "2026-04-19"
      author: "specter-team"
      type: minor
      description: "Add C-09/AC-09: doctor prints a parse-error pattern analysis that names schema version drift when a single error shape covers every discovered spec. Replaces unactionable noise with one sentence of diagnosis."
    - version: "1.0.0"
      date: "2026-04-14"
