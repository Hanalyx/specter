name: CI

on:
  push:
    branches: [main]
    paths: ['specter/**']
  pull_request:
    branches: [main]
    paths: ['specter/**']

defaults:
  run:
    working-directory: specter

jobs:
  check:
    name: Vet, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: specter/go.mod
          cache-dependency-path: specter/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o bin/specter ./cmd/specter/

      - name: Dogfood
        run: |
          bin/specter parse specs/*.spec.yaml
          bin/specter resolve
          bin/specter check
