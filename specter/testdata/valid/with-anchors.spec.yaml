spec:
  id: test-with-anchors
  version: "1.0.0"
  status: draft
  tier: 3

  context:
    system: Test system

  objective:
    summary: This spec uses YAML anchors and aliases to test anchor resolution.

  constraints:
    - &base_constraint
      id: C-01
      description: "MUST resolve anchors correctly"
      type: technical
      enforcement: error

    - id: C-02
      description: "MUST handle alias references"
      type: technical
      enforcement: error

  acceptance_criteria:
    - id: AC-01
      description: "Both constraints should have type=technical and enforcement=error after anchor resolution"
      references_constraints: ["C-01", "C-02"]
