version: 2

project_name: specter

builds:
  - main: ./cmd/specter/
    binary: specter
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Cosign keyless signing of checksums.txt via sigstore.
# The release workflow's permissions block must declare `id-token: write`
# so goreleaser-action can fetch the OIDC token. Verify a downloaded
# release with:
#   cosign verify-blob --certificate-identity-regexp 'https://github.com/Hanalyx/specter/.github/workflows/release.yml' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate checksums.txt.pem --signature checksums.txt.sig checksums.txt
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum
    output: true

# CycloneDX SBOM per archive via syft. Lands as <archive>.sbom.json
# alongside the archives in the GitHub Release.
sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

release:
  prerelease: auto

nfpms:
  - id: specter-deb
    package_name: specter
    formats:
      - deb
      - rpm
    vendor: Hanalyx
    homepage: "https://github.com/Hanalyx/spec-dd"
    maintainer: "Hanalyx <noreply@hanalyx.com>"
    description: "A type system for specs — validate, link, and type-check .spec.yaml files"
    license: MIT
    bindir: /usr/bin

